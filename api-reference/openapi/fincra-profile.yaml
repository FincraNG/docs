      parameters:
        - $ref: "#/components/parameters/NumericIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRoleRequest" }
      responses:
        "200":
          description: Role updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /user-management/roles/{id}/activate:
    patch:
      operationId: profileActivateRole
      tags: [Verification]
      summary: Activate a role
      description: >
        Activate a role by numeric id so it can be assigned. Use to enable a role. Synchronous.
      parameters:
        - $ref: "#/components/parameters/NumericIdPath"
      responses:
        "200":
          description: Role activated.
