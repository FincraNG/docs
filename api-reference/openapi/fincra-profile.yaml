      responses:
        "200":
          description: The merchant's team users.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/users/{id}:
    get:
      operationId: profileGetTeamUser
      tags: [Verification]
      summary: Get a team user
