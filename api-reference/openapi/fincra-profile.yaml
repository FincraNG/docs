      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Enable2faRequest" }
      responses:
        "200":
          description: 2FA enabled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

