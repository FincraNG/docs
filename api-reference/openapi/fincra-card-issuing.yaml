      required: [nonce]
      properties:
        nonce: { type: string, format: byte, description: "A base64-encoded nonce (RFC 4648, with padding). Required." }

    EphemeralTokenResult:
      type: object
      description: The minted ephemeral reveal token.
      required: [ephemeralToken]
      properties:
        ephemeralToken: { type: string, description: The opaque ephemeral reveal token (prefix etok_). }

    GetCardDetailsRequest:
      type: object
      description: >
        Body for POST /card_details. The derived nonce from clientSecret +
        clientTimestamp must match the token's stored nonce.
      required: [clientSecret, clientTimestamp]
      properties:
        clientSecret: { type: string, minLength: 1, description: The client secret used to derive the reveal nonce. Required. }
        clientTimestamp: { type: integer, minimum: 1, description: UNIX timestamp used to derive the nonce; must be within clock skew. Required. }

    CardDetails:
      type: object
      description: The revealed full card details. Served with no-store cache headers.
      required: [pan, cvv, expiryMonth, expiryYear]
      properties:
        pan: { type: string, description: The full card PAN. }
        cvv: { type: string, description: The card CVV. }
        expiryMonth: { type: string, description: Expiry month (MM). }
        expiryYear: { type: string, description: Expiry year (YYYY). }

    CardProduct:
      type: object
      description: A card product with the merchant's activation status.
      properties:
        id: { type: string, description: The card product id (prefix cprod_). }
        name: { type: string, description: The product name. }
        productCode: { type: string, description: The product code. }
        scheme: { $ref: "#/components/schemas/CardScheme" }
        currency: { allOf: [ { $ref: "#/components/schemas/Currency" } ], description: The product currency. }
        entityType: { $ref: "#/components/schemas/ProductEntityType" }
        status: { $ref: "#/components/schemas/ProductStatus" }
        activationStatus: { allOf: [ { $ref: "#/components/schemas/ProductActivationStatus" } ], description: Merchant-specific activation status; defaults to inactive if not activated. }
        createdAt: { type: string, description: Creation timestamp. Optional. }
        updatedAt: { type: string, description: Last update timestamp. Optional. }

    CardProductActivation:
      type: object
      description: The merchant-card-product activation record.
      properties:
        id: { type: string, description: The activation id (prefix mcprod_). }
        cardProductId: { type: string, description: The card product id (prefix cprod_). }
        productCode: { type: string, description: The product code. }
        businessId: { type: string, description: The merchant business id. }
        status: { $ref: "#/components/schemas/ProductActivationStatus" }
        createdAt: { type: string, description: Creation timestamp. }
        updatedAt: { type: string, description: Last update timestamp. }
