      required: [firstName, lastName, dob, countryCode, gender, maritalStatus, address, documents]
      properties:
        firstName: { type: string, minLength: 1, description: Given name. Required. }
        lastName: { type: string, minLength: 1, description: Family name. Required. }
        otherName: { type: string, minLength: 1, description: Middle/other name. Optional. }
        dob: { type: string, format: date, description: Date of birth (ISO date); must be in the past and age >= 18. Required. }
        countryCode: { allOf: [ { $ref: "#/components/schemas/CountryCode" } ], description: Country of residence; must be NG for individuals. Required. }
        gender: { $ref: "#/components/schemas/Gender" }
