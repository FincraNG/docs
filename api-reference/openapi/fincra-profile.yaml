      parameters:
        - $ref: "#/components/parameters/NumericIdPath"
      responses:
        "200":
          description: The role.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: profileUpdateRole
      tags: [Verification]
      summary: Update a role
      description: >
        Update a role by numeric id, changing its name or permission set. Use to adjust an
