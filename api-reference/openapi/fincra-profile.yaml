      parameters:
        - $ref: "#/components/parameters/NumericIdPath"
      responses:
        "200":
          description: Team user activated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/users/{id}/deactivate:
    patch:
      operationId: profileDeactivateTeamUser
      tags: [Verification]
      summary: Deactivate a team user
