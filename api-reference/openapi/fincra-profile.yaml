      responses:
        "200":
          description: 2FA disabled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /user-management/users/2fa-status:
    get:
