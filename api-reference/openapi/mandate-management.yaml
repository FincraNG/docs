        actionRequired:
          type: boolean
          description: Whether merchant action is required to progress the payment.
        status:
          type: string
          description: "Payment status, typically processing (or failed on immediate provider rejection)."
        mandateCode:
          type: string
          description: Mandate code on the transformed create response (omitted; not populated on this shape).

    Payment:
      type: object
      description: >
