openapi: 3.1.0
info:
  title: Fincra Core (fincra-core)
  version: "1.0.0"
  summary: Merchant-facing verification, reference-data, transaction-lookup and reporting API for the fincra-core service.
  description: >
    The fincra-core service hosts Fincra's shared merchant surface: account-name
    resolution (NUBAN / mobile-money / IBAN name enquiry), BVN / document / identity
    verification, read-only lookups of a business's transactions and disbursements, the
    merchant wallet-logs report, and the platform reference data (banks, bank branches,
    currencies, countries, currency pairs, channels, cash-pickup security questions).


    All endpoints here are synchronous request/response calls: the resolve and
    verification calls return their result (or a decision) in the same response, and the
    lookup and reference endpoints return the current stored data. The service emits NO
    merchant-facing webhooks and runs no outbound event producer, so there is no
    top-level `webhooks` block; the only outbound notification in code is an internal
    Slack alert (src/components/thresholds/thresholdsService.ts:107-119). Verification
    endpoints that charge the wallet (BVN, document verification) settle the charge
    inline as part of the same call.


    This spec is generated from the source of `fincra-core` on branch
    `fix/gate-spec-fee-tag-typecheck` (code is truth). The wider harvest was performed
    against the platform default branch `dev`. Anything undeterminable from code is
    marked with an `x-todo` extension carrying the exact `file:line`, and is listed in
    EXTRACTION-REPORT-core.md.
  contact:
    name: Fincra Developer Relations
    url: https://support.fincra.com
x-todo-gateway-prefix: >
  The Express app mounts routers at two roots only: app.use('/', ...) and
  app.use('/v2', componentsV2API) (src/app.ts:36-37). There is NO global version or
  base-path prefix on the '/' router — banks/currencies/countries/transactions/etc. are
  top-level. The public API prefix a merchant actually calls (platform-wide /v2, and any
  product prefix) is applied at the Kong gateway, which is NOT in this repo (no ingress
  file; src/server.ts:12-23). Paths below are exactly as routed in code; prepend the
  confirmed gateway prefix before publishing. See EXTRACTION-REPORT-core.md.

servers:
  - url: https://sandboxapi.fincra.com/core
    description: Sandbox (test keys). Powers the docs playground. Source k8s/overlays/sandbox/app.properties:6
  - url: https://api.fincra.com/core
    description: Production (live keys). Source k8s/overlays/prod/app.properties:7

security:
  - ApiKeyAuth: []

tags:
  - name: Verification
    description: Resolve bank accounts and verify identity (BVN, document, identity).
  - name: Payouts
    description: Look up a business's transactions, disbursements, channels and cash-pickup reference data.
  - name: Wallets
    description: The merchant wallet-logs report.
  - name: "Currency Conversion"
    description: Currency and currency-pair reference data.

paths:
  /accounts/resolve:
    post:
      operationId: coreResolveAccount
      tags: [Verification]
      summary: Resolve / verify a bank account
      description: >
        Perform a name enquiry against a destination account and return the resolved
        account-holder name. Supports NUBAN (Nigeria, 10-digit account plus a 3-6 digit
        bank code), Ghana bank accounts (SWIFT/BIC), mobile-money wallets, and IBAN. Use
        this before initiating a payout to confirm the beneficiary. The call is
        synchronous: the resolved name is returned in the same response, or a 422 is
        returned when the account cannot be resolved. Requires a merchant `api-key`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveAccountRequest"
            examples:
              ngNuban:
                summary: Resolve a Nigerian NUBAN account
                value:
                  currency: NGN
                  type: nuban
                  accountNumber: "0111111111"
                  bankCode: "058"
              ghMobileMoney:
                summary: Resolve a Ghana mobile-money wallet
                value:
                  currency: GHS
                  type: mobile_money
                  accountNumber: "233551234567"
                  mobileMoneyCode: MTN
      responses:
        "200":
          description: The account was resolved; the holder name is returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ResolvedAccount"
              example:
                success: true
                message: Account resolved successfully
                data:
                  accountNumber: "0111111111"
                  accountName: Amara Okeke
                  bankCode: "058"
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body fails resolveAccountSchema (currency not NGN/GHS; NGN accountNumber not exactly 10 digits; missing bankCode for NGN nuban; mobileMoneyCode not alpha; GHS bankSwiftCode not 8-11 letters; missing iban for type iban). Source src/components/misc/miscValidation.ts:3-77
        - errorType: UNPROCESSABLE_ENTITY
          status: 422
          trigger: "APIHelper expectPayload default true: 'No payload sent' on empty body; or integrations gateway returns 'Account could not be resolved. Please check your selection and try again'. Source src/components/misc/miscRepository.ts:101-129"
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Missing/invalid api-key at the auth layer. Source fincra-utils authMiddlewareV2.ts:76-123

  /transactions/search/business/{businessID}:
    post:
      operationId: coreListBusinessTransactions
      tags: [Payouts]
      summary: Search a business's transactions
      description: >
        Return a filtered, paginated list of the transactions belonging to one business
        (the authenticated merchant or one of its sub-accounts). Use this to build a
        transaction table or to reconcile. The call is synchronous and returns the
        current stored transactions. Requires a merchant `api-key`; the caller must own
        the business in the path (validateBusinessOwnership).
      parameters:
        - $ref: "#/components/parameters/BusinessIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListBusinessTransactionsRequest"
            example:
              page: 1
              perPage: 20
      responses:
        "200":
          description: A page of the business's transactions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body/params fail listBusinessTransactionsSchema. Source src/components/transaction/transactionAPI.ts:13-25
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Authenticated merchant does not own the business in the path (validateBusinessOwnership). Source src/components/transaction/transactionAPI.ts:13-25

  /transactions/search/business/{businessID}/sub-accounts:
    post:
      operationId: coreListBusinessSubAccountsTransactions
      tags: [Payouts]
      summary: Search a business's sub-account transactions
      description: >
        Return a filtered, paginated list of the transactions across all sub-accounts of
        one business. Use this to reconcile a parent business over its sub-accounts in a
        single call. The call is synchronous. Requires a merchant `api-key`; the caller
        must own the business in the path (validateBusinessOwnership).
      parameters:
        - $ref: "#/components/parameters/BusinessIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListBusinessTransactionsRequest"
            example:
              page: 1
              perPage: 20
      responses:
        "200":
          description: A page of the business's sub-account transactions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body/params fail listBusinessTransactionsSchema. Source src/components/transaction/transactionAPI.ts:28-40
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Authenticated merchant does not own the business in the path. Source src/components/transaction/transactionAPI.ts:28-40

  /transactions/{transactionID}:
    get:
      operationId: coreGetBusinessTransaction
      tags: [Payouts]
      summary: Get one transaction
      description: >
        Fetch a single business or sub-account transaction by its Fincra transaction id.
        Use for status polling or to display one transaction's detail. The call is
        synchronous and returns the current stored transaction. Requires a merchant
        `api-key`; the caller must own the transaction (validateTransactionOwnership).
      parameters:
        - name: transactionID
          in: path
          required: true
          description: The Fincra transaction id to fetch.
          schema: { type: string }
      responses:
        "200":
          description: The transaction.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Path fails getTransactionSchema. Source src/components/transaction/transactionAPI.ts:46-57
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Authenticated merchant does not own the transaction (validateTransactionOwnership). Source src/components/transaction/transactionAPI.ts:46-57

  /transactions/disbursements:
    get:
      operationId: coreListBusinessDisbursements
      tags: [Payouts]
      summary: List the business's disbursements
      description: >
        Return all disbursements for the authenticated business. Use to reconcile
        outbound payouts recorded against the business. The call is synchronous and
        returns the current stored disbursements. Auth is inherited from the parent
        mount (merchant `api-key`).
      responses:
        "200":
          description: The business's disbursements.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Query fails GetAllBusinessTransactionsSchema. Source src/components/transaction/disbursements/disbursementsAPI.ts:7-13

  /transactions/disbursements/by-reference:
    get:
      operationId: coreGetDisbursementByReference
      tags: [Payouts]
      summary: Get a disbursement by Fincra reference
      description: >
        Fetch a single disbursement for the authenticated business by its Fincra
        `reference`. Use to look up one payout when you stored the Fincra reference. The
        call is synchronous. Auth inherited from the parent mount (merchant `api-key`).
      parameters:
        - name: reference
          in: query
          required: true
          description: The Fincra disbursement reference to look up.
          schema: { type: string }
      responses:
        "200":
          description: The disbursement.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Query fails getBusinessTransactionByReferenceSchema. Source src/components/transaction/disbursements/disbursementsAPI.ts:16-23

  /transactions/disbursements/by-customer-reference:
    get:
      operationId: coreGetDisbursementByCustomerReference
      tags: [Payouts]
      summary: Get a disbursement by customer reference
      description: >
        Fetch a single disbursement for the authenticated business by the merchant's own
        `customerReference` (the reference you supplied when creating the payout). Use to
        reconcile against your own identifiers. The call is synchronous. Auth inherited
        from the parent mount (merchant `api-key`).
      parameters:
        - name: customerReference
          in: query
          required: true
          description: The merchant's own reference supplied at payout creation.
          schema: { type: string }
      responses:
        "200":
          description: The disbursement.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Query fails getBusinessTransactionByCustomerReferenceSchema. Source src/components/transaction/disbursements/disbursementsAPI.ts:26-33

  /channels:
    get:
      operationId: coreListChannels
      tags: [Payouts]
      summary: List channels
      description: >
        Return the list of supported payment channels (read from static channel
        reference data). Use to discover the channels available for routing. The call is
        synchronous and returns the current channel list. This V1 route applies
        `authenticate()` so a merchant `api-key` is required. The response is a raw
        envelope with no `message` key (src/controllers/channels.ts:13-16).
      responses:
        "200":
          description: The channel list.
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean, const: true, description: Always true on success. }
                  data:
                    type: array
                    description: The supported channels (static reference data).
                    items:
                      type: object
                      description: A channel entry. Exact fields are the static data/channels.json shape (not harvested).
                      x-todo: "Channel object fields not harvested; served from static data/channels.json. Source src/controllers/channels.ts:4-16"
        "403": { $ref: "#/components/responses/Forbidden" }
      x-fincra-error-catalog:
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Missing/invalid api-key at the auth layer. Source src/routes/channels.ts:6-8

  /merchant-report/wallet-logs:
    get:
      operationId: coreGetWalletLogsReport
      tags: [Wallets]
      summary: Get the merchant wallet-logs report
      description: >
        Return a paginated report of the merchant's wallet transaction logs (credits and
        debits), filtered by currency and optional date range. This is the only
        merchant-callable wallet-style endpoint in core; it is a report, not a live
        balance API. The call is synchronous. Requires a merchant `api-key`; the
        business is derived from the authenticated user.
      parameters:
        - name: currency
          in: query
          required: true
          description: Wallet currency to report on; trimmed and uppercased (no enum restriction in code).
          schema: { type: string }
        - name: page
          in: query
          description: 1-based page number. Defaults to 1.
          schema: { type: integer, default: 1, minimum: 1 }
        - name: perPage
          in: query
          description: Items per page. Defaults to 20, maximum 300.
          schema: { type: integer, default: 20, maximum: 300 }
        - name: from
          in: query
          description: Include wallet logs on or after this date (ISO-8601).
          schema: { type: string, format: date }
        - name: to
          in: query
          description: Include wallet logs on or before this date (ISO-8601).
          schema: { type: string, format: date }
      responses:
        "200":
          description: A page of wallet logs.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Query fails getAllWalletLogsSchema (currency required; perPage > 300). Source src/components/merchantReport/merchantReportValidation.ts:3-9
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Missing/invalid api-key at the auth layer. Source src/routes/index.ts:81-85

  /bvn-verification:
    post:
      operationId: coreVerifyBvn
      tags: [Verification]
      summary: Verify a BVN
      description: >
        Perform a Bank Verification Number lookup for the authenticated business and
        return the verification result. The call is synchronous and charges the
        merchant's wallet inline. Requires a merchant `api-key` AND the BVN_VERIFICATION
        product entitlement (authorizeProduct), which is bypassed only when
        APP_ENVIRONMENT is 'test'.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyBvnRequest"
            example:
              bvn: "22212345678"
              business: 63f9a1b2c4d5e6f7a8b9c0d1
      responses:
        "200":
          description: The BVN verification result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body fails newBvnVerificationSchema (bvn not exactly 11 chars; business missing). Source src/components/bvnVerification/bvnVerificationValidation.ts:4-7
        - errorType: ACCESS_DENIED
          status: 403
          trigger: "Missing/invalid api-key, or merchant lacks the BVN_VERIFICATION product: \"Access Denied. You're not authorized to access <product> product\". Source fincra-utils authMiddlewareV2.ts:412-449"

  /bvn-verification/logs:
    get:
      operationId: coreListBvnVerificationLogs
      tags: [Verification]
      summary: List BVN verification logs
      description: >
        Return a paginated list of the merchant's past BVN verification attempts. Use to
        audit or display prior verifications. The call is synchronous. Requires a
        merchant `api-key` AND the BVN_VERIFICATION product entitlement; the business is
        derived from the authenticated user unless overridden by the `business` query.
      parameters:
        - name: page
          in: query
          description: 1-based page number. Defaults to 1.
          schema: { type: integer, default: 1, minimum: 1 }
        - name: perPage
          in: query
          description: Items per page. Defaults to 10, maximum 20.
          schema: { type: integer, default: 10, maximum: 20 }
        - name: business
          in: query
          description: Optional business id override; otherwise derived from the authenticated user.
          schema: { type: string }
      responses:
        "200":
          description: A page of BVN verification logs.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Query fails getAllBvnVerificationLogsSchema (perPage > 20). Source src/components/bvnVerification/bvnVerificationValidation.ts:9-11
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Missing/invalid api-key, or merchant lacks the BVN_VERIFICATION product. Source fincra-utils authMiddlewareV2.ts:412-449

  /cash-pick-up-security-questions:
    get:
      operationId: coreListCashPickUpSecurityQuestions
      tags: [Payouts]
      summary: List cash-pickup security questions
      description: >
        Return the list of security questions available for cash-pickup payouts. Use to
        present the question choices when collecting a cash-pickup security answer. The
        call is synchronous and takes no payload. Requires a merchant `api-key`.
      responses:
        "200":
          description: The cash-pickup security questions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
      x-fincra-error-catalog:
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Missing/invalid api-key at the auth layer. Source src/routes/cashPickUpSecurityQuestions.ts:7-14

  /v2/document-verification:
    post:
      operationId: coreVerifyDocument
      tags: [Verification]
      summary: Verify a document
      description: >
        Verify a government-issued identity document (national ID, BVN, passport,
        driver's licence, voter's card) for a supported country and return the
        verification result. The call is synchronous and charges the merchant's wallet
        inline. The inner `data` object shape is validated downstream, not at the Joi
        edge. Requires a merchant `api-key`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyDocumentRequest"
            example:
              country: NG
              type: NATIONAL_ID
              data:
                idNumber: "70123456789"
              refresh: false
      responses:
        "200":
          description: The document verification result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body fails verifyDocumentValidationSchema (country not NG/GH/KE; type not in the document-type enum; data not an object). Source src/componentsV2/documentVerification/documentVerificationValidation.ts:4-15
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Missing/invalid api-key at the auth layer. Source src/componentsV2/componentsV2API.ts:15-19

  /v2/identity-verification:
    post:
      operationId: coreVerifyIdentity
      tags: [Verification]
      summary: Verify an identity
      description: >
        Run an identity verification for one of the supported verification types across
        NG, KE, GH, ZA or the GLOBAL scope, including NUBAN account verification, BVN,
        NIN, CAC, passport, driver's licence, voter's card, address and liveness. The
        call is synchronous and returns the verification result. Required fields depend on
        `verificationType` (see the per-type notes). Requires a merchant `api-key`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyIdentityRequest"
            examples:
              ngBvn:
                summary: Verify a Nigerian BVN
                value:
                  verificationType: bvn
                  countryCode: NG
                  searchParameter: "22212345678"
              ngNuban:
                summary: Verify a Nigerian NUBAN account
                value:
                  verificationType: nuban
                  countryCode: NG
                  searchParameter: Amara Okeke
                  accountNumber: "0111111111"
                  bankCode: "058"
      responses:
        "200":
          description: The identity verification result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body fails IdentityVerificationSchema (unknown verificationType for the country; countryCode not in NG/KE/GH/ZA/GL; missing per-type required fields). Source src/componentsV2/identityVerification/identityVerificationValidation.ts:11-184
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Missing/invalid api-key at the auth layer. Source src/componentsV2/componentsV2API.ts:26-30

  /banks:
    get:
      operationId: coreListBanks
      tags: [Payouts]
      summary: List banks / institutions
      description: >
        Return the list of banks and institutions Fincra can pay to, filtered by
        currency, 2-letter country, and/or payment destination. Use to populate a bank
        picker before a payout or account resolution. The call is synchronous. NOTE: this
        route carries NO in-app auth middleware (src/routes/index.ts:33); merchant
        enforcement, if any, is applied by the upstream gateway (see x-todo).
      x-todo: "GET /banks is mounted with NO auth middleware in code (src/routes/index.ts:33). Whether the Kong gateway injects/requires api-key before it reaches core is not visible in-repo. Source src/components/banks/banksAPI.ts:7-14"
      parameters:
        - name: currency
          in: query
          description: Filter by currency; trimmed and uppercased (no code enum enforced in this validator).
          schema: { type: string }
        - name: country
          in: query
          description: Filter by 2-letter country code; trimmed and uppercased.
          schema: { type: string, minLength: 2, maxLength: 2 }
        - name: paymentDestination
          in: query
          description: Filter by delivery type.
          schema: { $ref: "#/components/schemas/PaymentDestination" }
      responses:
        "200":
          description: The matching banks / institutions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Query fails getAllBanksSchema (country not length-2; invalid paymentDestination). Source src/components/banks/banksValidation.ts:9-13
        - errorType: UNPROCESSABLE_ENTITY
          status: 422
          trigger: "'Either country or currency is required' when neither is supplied; or 'No payload sent' (APIHelper expectPayload true) when no query params at all. Source src/components/banks/banksService.ts:26-30"

  /banks/branches:
    get:
      operationId: coreListBankBranches
      tags: [Payouts]
      summary: List bank branches
      description: >
        Return the list of institution branches known to Fincra. Use where a corridor
        requires a branch selection. The call is synchronous. NOTE: this route carries NO
        in-app auth middleware (mounted under /banks); merchant enforcement, if any, is
