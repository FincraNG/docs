        settlementTime:
          type: string
          description: The settlement time classification.
        feeBearer:
          $ref: "#/components/schemas/FeeBearer"
        reference:
          type: string
          description: The internal payment reference (fcr-p- prefixed).
        merchantReference:
          type: string
          description: The merchant-supplied reference (idempotency key).
        status:
          type: string
          description: The payment status.
        varianceType:
          type: string
          description: Variance classification between expected and received amounts.
        mandateCode:
          type: string
          description: The NIBSS mandate code the payment was drawn against.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.

