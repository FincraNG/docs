components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key
      description: >
        Merchant API key in the `api-key` header. The delegated authenticate() middleware
        (fincra-utils authMiddlewareV2, verified against auth-service /auth/verify-auth)
        accepts a merchant api-key header, a bearer `authorization` token, or a
        service-secret-key; the merchant contract here is the api-key. There is NO
        separate x-pub-key/public-key route guard anywhere in this service; test vs live
        is determined by the key itself. Source
        fincra-utils/src/middleware/auth/authMiddlewareV2.ts:44-90. NOTE: two routes are
        exceptions and set `security: []` — GET /payments/{businessID}/{transactionID}
        (guarded only by a Business _id lookup) and the /dispute routes (no auth
        middleware at all).

  parameters:
    BusinessQuery:
      name: business
      in: query
      required: true
      description: The 24-character Fincra business id the collections belong to.
      schema:
        type: string
        minLength: 24
        maxLength: 24
    BusinessQueryOptional:
      name: business
      in: query
      required: false
      description: Optional 24-character Fincra business id filter.
      schema:
        type: string
        minLength: 24
        maxLength: 24
    PageQuery:
      name: page
      in: query
      description: 1-based page number. Defaults to 1.
      schema: { type: integer, default: 1, minimum: 1 }
    PerPageQuery:
      name: perPage
      in: query
      description: Items per page. Defaults to 10.
      schema: { type: integer, default: 10, minimum: 1 }

  responses:
    Forbidden:
      description: The credential is rejected or not allowed for this business.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Access denied
            errorType: ACCESS_DENIED
    NotFound:
      description: The referenced resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Collection not found
            errorType: RESOURCE_NOT_FOUND
    UnprocessableEntity:
      description: Validation or business-rule failure. `errorType` identifies the cause.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Refund already initiated
            errorType: UNPROCESSABLE_ENTITY
    ServerError:
      description: Unexpected server or database error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: "Error occured during operation. We're currently checking why this is happening."
            errorType: INTERNAL_SERVER_ERROR

  schemas:
    SuccessEnvelope:
      type: object
      description: >
        The standard Fincra success envelope built by fincra-utils APIHelper
        (APIHelper.ts:77). `data` is [] when a handler returns nothing.
      required: [success]
      properties:
        success:
          type: boolean
          const: true
          description: Always true on a 2xx response.
        message:
          type: string
          description: Human-readable summary of the result.
        data:
          description: The result payload; shape depends on the endpoint. Defaults to [] when the handler returns nothing.

    ErrorResponse:
      type: object
      description: >
        The shared Fincra error envelope built by fincra-utils APIHelper
        (APIHelper.ts:140-145). Alongside the three contract keys it also ships an
        `errors` detail key (populated for Joi validation arrays, otherwise omitted).
      required: [success, error, errorType]
      properties:
        success:
          type: boolean
          const: false
          description: Always false on an error response.
        error:
          type: string
          description: Human-readable error message.
        errorType:
          $ref: "#/components/schemas/ErrorType"
        errors:
          description: >
            Optional structured detail (e.g. the array of per-field Joi messages on a
            VALIDATION_FAILED). Not present on every error branch.

    ErrorType:
      type: string
      description: >
        SCREAMING_SNAKE_CASE machine code for the error. Enumerates the values reachable
        on the collections merchant/public paths (from the fincra-utils BaseError
        subclasses grepped at the throw sites; see EXTRACTION-REPORT-collections.md).
        Note: the objection NotFoundError divergence ships NO errorType (see the report).
      enum:
        - VALIDATION_FAILED
        - UNPROCESSABLE_ENTITY
        - RESOURCE_NOT_FOUND
        - RESOURCE_EXIST
        - OPERATION_FORBIDDEN
        - ACCESS_DENIED
        - USER_AUTHENTICATION_FALSE
        - HTTP_ERROR
        - HTTP_CONNECTION_ERROR
        - FILE_SYSTEM_ERROR
        - SERVICE_UNAVAILABLE
        - INTERNAL_SERVER_ERROR
        - SERVER_ERROR

    Currency:
      type: string
      description: >
        Platform-supported currency codes (Currencies enum,
        src/components/collections/collectionsInterface.ts:223-235). Enforced ONLY on the
        `POST /transfer/simulate` `currency` field; all other currency request fields
        across the list/export/refund schemas are free-form uppercased strings with no
        enum (see EXTRACTION-REPORT-collections.md).
      enum: [NGN, KES, GHS, GBP, EUR, USD, UGX, TZS, ZAR, ZMW, CAD]

    CollectionStatus:
      type: string
      description: >
        Lifecycle state of a collection (CollectionStatus enum,
        src/components/collections/interfaces/colletionsEnums.ts:19-43). Terminal states
        include successful, failed, refunded, and reversed.
      enum:
        - pending
        - initiated
        - processing
        - successful
        - failed
        - reversal-initiated
        - awaiting-reversal
        - awaiting-refund
        - refunded
        - reversed

    PaymentMethod:
      type: string
      description: >
        How the inbound payment was made (PaymentMethod enum,
        src/components/collections/interfaces/colletionsEnums.ts:19-30).
      enum:
        - virtual_account
        - manual_funding
        - pos
        - mobile_money
        - card
        - bank_transfer
        - payattitude
        - wallet_transfer
        - direct_debit
        - palmpay

    PartyDetails:
      type: object
      description: A payer or payee on a simulated bank-transfer collection.
      required: [name, accountNumber]
      properties:
        name:
          type: string
          description: The account holder's name. Required.
        accountNumber:
          type: string
          description: The account number. Required.
        bankName:
          type: string
          description: The bank name.
        bankCode:
          type: string
          description: The bank / institution code.

    ExportCollectionsRequest:
