              lastName: Okeke
              email: amara.okeke@ada-commerce.com
              phoneNumber: "+2348030001122"
      responses:
        "200":
          description: Customer created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
    get:
      operationId: profileListCustomers
      tags: [Verification]
      summary: List customers
      description: >
        Return the merchant's customer records. Use to build a customers table or to
