            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/roles/{id}/users/export:
    post:
      operationId: profileExportRoleUsers
      tags: [Verification]
      summary: Export users of a role
      description: >
        Export the team members assigned to a role by numeric id to a file. Use to download
        the role's membership. Synchronous; returns the export artifact reference.
      parameters:
        - $ref: "#/components/parameters/NumericIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportRequest" }
      responses:
        "200":
          description: Role-users export produced.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key
      description: >
        Merchant secret key, sent in the `api-key` header (fallback header `apikey` is
        also accepted). The auth-service classifies the key as test or live and resolves
        the merchant. Source node_modules/fliqpay-utils/dist/middleware/auth/authUtil.js:19.
        Some dashboard routes additionally accept an `Authorization: Bearer <token>` user
        token, and product-gated routes require the merchant to hold the relevant product
        (e.g. VIRTUAL_ACCOUNT); the product check is bypassed when APP_ENVIRONMENT=test.

  parameters:
    BusinessIdPath:
      name: businessID
      in: path
      required: true
      description: The Fincra business id the resource belongs to.
      schema:
        type: string
    SubAccountIdPath:
      name: subAccountID
      in: path
      required: true
      description: The sub-account id under the business.
      schema:
        type: string
    BeneficiaryIdPath:
      name: beneficiaryID
      in: path
      required: true
      description: The beneficiary id under the business.
      schema:
        type: string
    CardIdPath:
      name: id
      in: path
      required: true
      description: The virtual-card id.
      schema:
        type: string
    NumericIdPath:
      name: id
      in: path
      required: true
      description: Numeric id (the route path is constrained to digits).
      schema:
        type: integer
        minimum: 0

  responses:
    Forbidden:
      description: The request is authenticated but not allowed for this business/product.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Access Denied. You're not authorized to access VIRTUAL_ACCOUNT product
            errorType: ACCESS_DENIED
    NotFound:
      description: The referenced resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Virtual account not found
            errorType: VIRTUAL_ACCOUNT_NOT_FOUND
    UnprocessableEntity:
      description: Validation or business-rule failure. `errorType` identifies the cause.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Validation failed
            errorType: VALIDATION_FAILED
    ServerError:
      description: Unexpected server or database error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: "Error occured during operation. We're currently checking why this is happening."
            errorType: INTERNAL_SERVER_ERROR

  schemas:
    SuccessEnvelope:
      type: object
      description: The standard Fincra success envelope. `data` is [] when a handler returns nothing.
      required: [success]
      properties:
        success:
          type: boolean
          const: true
          description: Always true on a 2xx response.
        message:
          type: string
          description: Human-readable summary of the result.
        data:
          description: The result payload; shape depends on the endpoint.

    ErrorResponse:
      type: object
      description: >
        The shared Fincra error envelope. Controller errors are built by fincra-utils
        APIHelper (adds an optional `errors` detail array); middleware/auth and 404 errors
        are built by the fincra-utils errorHandler (may add code/attribution/retryable).
        Source fincra-utils APIHelper.ts:145, errorHandler.ts:8.
      required: [success, error, errorType]
      properties:
        success:
          type: boolean
          const: false
          description: Always false on an error response.
        error:
          type: string
          description: Human-readable error message.
        errorType:
          $ref: "#/components/schemas/ErrorType"
        errors:
          description: >
            Optional structured detail (e.g. the array of per-field Joi messages on a
            VALIDATION_FAILED). Present only on the controller (APIHelper) error path.
        code:
          type: string
          description: Optional canonical error code, present only on the middleware error path.
        attribution:
          type: string
          description: Optional attribution hint, present only on canonical middleware errors.
        retryable:
          type: boolean
          description: Optional retry hint, present only on canonical middleware errors.

    ErrorType:
      type: string
      description: >
        SCREAMING_SNAKE_CASE machine code for the error. Enumerates the values reachable on
        the merchant-facing profile paths (from throw sites; see EXTRACTION-REPORT-profile.md).
      enum:
        - VALIDATION_FAILED
        - INVALID_CURRENCY
        - BUSINESS_PROFILE_REQUIRED
        - VIRTUAL_ACCOUNT_NOT_FOUND
        - CONFLICT_ERROR
        - DUPLICATE_REFERENCE
        - DUPLICATE_ACTION_FORBIDDEN
        - UNPROCESSABLE_ENTITY
        - RESOURCE_NOT_FOUND
        - ACCESS_DENIED
        - INTERNAL_SERVER_ERROR

    Currency:
      type: string
      description: >
        Reserved-account currency codes (enum VirtualAccountCurrency,
        src/components/virtualAccounts/interfaces/virtualAccountsEnum.ts:25). The MCY (FCY)
        subset is GBP, EUR, USD, CAD.
      enum: [GBP, EUR, NGN, USD, XAF, GHS, KES, CAD, TZS]

    VirtualAccountType:
      type: string
      description: Whether the reserved account is for a corporate or individual holder.
      enum: [corporate, individual]

    VirtualAccountStatus:
      type: string
      description: >
        Lifecycle state of a reserved account (enum VirtualAccountStatus,
        virtualAccountsEnum.ts).
      enum: [pending, approved, declined, expired, closed, reviewed]

    VirtualAccountEntityType:
      type: string
      description: Whether the account belongs to the main account or a sub-account.
      enum: [main_account, sub_account]

    VirtualAccountChannel:
      type: string
      description: >
        Provider channel that issued or will issue the account (enum VirtualAccountChannel,
        virtualAccountsEnum.ts:68).
      enum:
        - rave
        - wema
        - uba
        - reservetrust
        - vfd
        - providus
        - blackthorn
        - globus
        - moniepoint
        - providusOmfb
        - sterling
        - clearjunction
        - bold
        - tazapay
        - keyrails
        - habari
        - rail
        - cca
        - flutterwave
        - choice
        - pateno
        - temboplus
        - ifx
        - freemarket
        - firstbank

    NgnChannel:
      type: string
      description: >
        Active NGN provider channels accepted on NGN reserved-account requests
        (NGNVirtualAccountsValidation.ts:199; vfd/providus/rave are commented out in code).
      enum: [globus, wema, uba, habari, sterling, moniepoint, bold]

    Address:
      type: object
      description: Postal address used in reserved-account KYC.
      required: [countryOfResidence, number, zip, street, state, city]
      properties:
        countryOfResidence:
          type: string
          maxLength: 2
          description: ISO-3166 alpha-2 country of residence, uppercased. Required.
        number:
          type: string
          description: Building/house number. Required.
        zip:
          type: string
          description: Postal/zip code. Required.
        street:
          type: string
          description: Street line. Required.
        state:
          type: string
          description: State or region. Required.
        city:
          type: string
          description: City. Required.

    KycDocument:
      type: object
      description: Identity document supplied in reserved-account KYC (createDocumentSchema).
      required: [type, number, issuedCountryCode, issuedBy]
      properties:
        type:
          type: string
          description: Document type (enum IBANDocumentType). Required.
          enum: [passport, driverLicense, idCard, nationalId]
        number:
          type: string
          description: Document number. Required.
        issuedCountryCode:
          type: string
          maxLength: 2
          description: ISO-3166 alpha-2 issuing country, uppercased. Required.
        issuedBy:
          type: string
          description: Issuing authority. Required.
        issuedDate:
          type: string
          format: date
          description: Issue date (YYYY-MM-DD, not in the future). Required for passport/driverLicense.
        expirationDate:
          type: string
          format: date
          description: Expiry date (YYYY-MM-DD, after issuedDate). Required for passport/driverLicense.

    NgnIndividualKyc:
      type: object
      description: >
        NGN individual KYC (NGNIndividualKYCSchema). bvnValidationOption is force-set
        server-side, so some fields become conditionally required depending on it.
      required: [lastName, firstName]
      properties:
        lastName:
          type: string
          description: Family name (ASCII, trimmed). Required.
        firstName:
          type: string
          description: Given name (ASCII, trimmed). Required.
        email:
          type: string
          format: email
          description: Email. Required when bvn is empty and documents are required.
        bvn:
          type: string
          description: Bank Verification Number. Required when bvnValidationOption is bvn_required.
        address:
          description: Address. Required when bvn is empty and documents are required.
          allOf:
            - $ref: "#/components/schemas/Address"
        document:
          description: Identity document. Required when bvn is empty and documents are required.
          allOf:
            - $ref: "#/components/schemas/KycDocument"
        bvnValidationOption:
          type: string
          description: BVN validation mode. Defaults to bvn_required but is overwritten server-side.
          enum: [bypass, documents_required, bvn_required]

    NgnCorporateKyc:
      type: object
      description: >
        NGN corporate KYC (NGNCorporateKYCSchema). Many fields become required only when
        documents_required (bvn empty).
      required: [businessName]
      properties:
        businessName:
          type: string
          description: Registered business name (ASCII, trimmed). Required.
        rcNumber:
          type: string
          description: Corporate registration (RC) number.
        incorporationDate:
          type: string
          description: Date of incorporation (MM-DD-YYYY).
        email:
          type: string
          format: email
          description: Business email. Required when bvn is empty and documents are required.
        bvn:
          type: string
          description: Director/business BVN. Required when bvnValidationOption is bvn_required.
        bvnName:
          type: string
          description: Name attached to the BVN.
        website:
          type: string
          description: Business website URL. Required when documents are required.
        taxNumber:
          type: string
          description: Tax identification number. Required when documents are required.
        businessCategory:
          type: string
          description: Business category (enum VirtualAccountBusinessCategory). Required when documents are required.
        primaryBusiness:
          type: string
          description: Primary line of business (enum VirtualAccountPrimaryBusiness). Required when documents are required.
        address:
          description: Business address. Required when documents are required.
          allOf:
            - $ref: "#/components/schemas/Address"
        bvnValidationOption:
          type: string
          description: BVN validation mode. Defaults to bvn_required but is overwritten server-side.
          enum: [bypass, documents_required, bvn_required]

    NonNgnCorporateKyc:
      type: object
      description: >
        Corporate KYC for GHS/KES/TZS reserved accounts. KES additionally requires
        primaryBusiness and country fields (see per-currency notes in the report).
      required: [businessName]
      properties:
        businessName:
          type: string
          description: Registered business name (ASCII, trimmed). Required.
        email:
          type: string
          format: email
          description: Business email. Required for GHS.
        primaryBusiness:
          type: string
          description: Primary line of business (enum VirtualAccountPrimaryBusiness). Required for KES.
        businessRegistrationCountry:
          type: string
          maxLength: 2
          description: ISO-3166 alpha-2 registration country, uppercased. Required for KES.
        incorporationCountryCode:
          type: string
          maxLength: 2
          description: ISO-3166 alpha-2 incorporation country, uppercased. Required for KES.

    NonNgnIndividualKyc:
      type: object
      description: Individual KYC for GHS/KES/TZS reserved accounts.
      required: [lastName, firstName]
      properties:
        lastName:
          type: string
          description: Family name (ASCII, trimmed). Required.
        firstName:
          type: string
          description: Given name (ASCII, trimmed). Required.
        email:
          type: string
          format: email
          description: Email. Required for GHS.

    RequestVirtualAccountRequest:
      type: object
      description: >
        Body for POST /virtual-accounts/requests (and the corporate self-request, migrate,
        and sub-account request variants). The exact KYCInformation shape depends on
        currency and accountType; NGN uses NgnIndividualKyc/NgnCorporateKyc, GHS/KES/TZS use
        the NonNgn* schemas. IBAN (GBP/EUR/USD/CAD) and XAF schemas were not field-harvested
        (see EXTRACTION-REPORT-profile.md).
      required: [accountType, currency]
      properties:
        accountType:
          $ref: "#/components/schemas/VirtualAccountType"
        currency:
          $ref: "#/components/schemas/Currency"
        channel:
          $ref: "#/components/schemas/NgnChannel"
        merchantReference:
          type: string
