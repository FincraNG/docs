        countryCode:
          type: string
          description: >
            Country scope. Defaults to 'GL' for GLOBAL verification types; otherwise
            required.
          enum: [NG, KE, GH, ZA, GL]
        accountNumber:
          type: string
          minLength: 10
          maxLength: 10
          description: Required for verificationType=nuban; the 10-digit account number.
        bankCode:
          type: string
          description: Required for verificationType=nuban; the bank/institution code.
        rcNumber:
          type: string
          minLength: 5
          maxLength: 10
          description: Required for verificationType cac/cacAdvanced; the company RC number (alphanumeric).
        companyType:
