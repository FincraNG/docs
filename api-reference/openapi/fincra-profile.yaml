      responses:
        "200":
          description: Backup codes generated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/users/2fa/otp:
    post:
      operationId: profileGenerate2faOtp
      tags: [Verification]
      summary: Generate a 2FA OTP
      description: >
        Generate a one-time password for a two-factor-authentication flow for the
        authenticated user. Use to issue an OTP challenge. Synchronous acknowledgement.
      responses:
        "200":
          description: OTP generated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/users/tour/complete:
    patch:
      operationId: profileCompleteUserTour
      tags: [Verification]
      summary: Complete the product tour
