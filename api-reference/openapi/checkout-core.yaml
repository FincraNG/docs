openapi: 3.1.0
info:
  title: Fincra Checkout (checkout-core)
  version: "1.0.0"
  summary: Merchant-facing hosted-checkout, direct-charge, and payment-link API for the checkout-core service.
  description: >
    Accept payments from customers across African rails — cards, bank transfers,
    mobile money, EFT, PayAttitude, and PalmPay — through a Fincra-hosted checkout
    page, a direct server-to-server charge, or a shareable payment link.


    Checkout is a mix of synchronous and asynchronous flows. Initiating a hosted
    payment (`POST /payments`) or a direct charge (`POST /charges`) creates the
    transaction; card and mobile-money charges then move through an
    authorization step (OTP/PIN/3DS) before reaching a terminal state, while bank
    transfer and EFT settle out of band. The final state is delivered by the
    `charge.successful` / `charge.failed` webhook and can also be polled with the
    verify and get-by-reference endpoints.


    This spec is generated from the source of `checkout-core` on branch `dev`
    (code is truth). Anything undeterminable from code is marked with an `x-todo`
    extension carrying the exact `file:line`, and is listed in
    EXTRACTION-REPORT-checkout.md.
  contact:
    name: Fincra Developer Relations
    url: https://support.fincra.com
x-todo-gateway-prefix: >
  The service mounts every route at "/" with NO global prefix and NO versioning
  (src/start.ts:24-65 — no setGlobalPrefix). Controllers serve at their bare
  @Controller paths (/payments, /charges, /payment-links, /fees, /banks, /resolve,
  /data/*, /outgoing-webhooks). The public prefixes a merchant calls (observed by QA
  as /checkout/* and /checkout-core/*, and hinted by k8s/overlays/prod/app.properties:8
  BASE_URL=https://api.fincra.com/checkout-core) are applied at the Kong gateway, which
  is not in this repo. Paths below are exactly as routed in code; prepend the confirmed
  gateway prefix before publishing. See EXTRACTION-REPORT-checkout.md.

servers:
  - url: https://sandboxapi.fincra.com/checkout-core
    description: Sandbox (public test keys, pk_test_*). Powers the docs playground and the hosted checkout page.
  - url: https://api.fincra.com/checkout-core
    description: Production (live public keys, pk_*). Source k8s/overlays/prod/app.properties:8

security:
  - BusinessIdAuth: []
  - PubKeyAuth: []

tags:
  - name: Checkout
    description: >
      Hosted checkout payments, direct charges, payment links, and the public
      lookups (banks, BINs, methods) that back the Fincra checkout page.

paths:
  /payments:
    post:
      operationId: checkoutInitiatePayment
      tags: [Checkout]
      summary: Initiate a hosted checkout payment
      description: >
        Create a hosted checkout payment and obtain a reference the customer's
        browser uses to load the Fincra checkout page. Use this to start a hosted
        payment from your merchant backend. Authenticated with the public key
        (`x-pub-key`), not the secret api-key.


        The call is synchronous in that it returns the created payment
        immediately; collecting the money is asynchronous and happens on the
        hosted page (method selection then charge/authorize). The terminal state
        is delivered by the `charge.successful` / `charge.failed` webhook and can
        be polled via `checkoutGetPaymentByReference`.
      security:
        - PubKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PubKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
            examples:
              ngnCardAndTransfer:
                summary: NGN hosted payment, card + bank transfer enabled
                value:
                  amount: 5000
                  currency: NGN
                  customer:
                    email: amara.okeke@example.com
                    name: Amara Okeke
                    phoneNumber: "2348012345678"
                  reference: checkout-req-3f81a9c2
                  redirectUrl: https://merchant.example.com/checkout/complete
                  paymentMethods: [card, bank_transfer]
                  defaultPaymentMethod: card
                  feeBearer: customer
      responses:
        "201":
          description: Hosted payment created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Payment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: BAD_REQUEST
          status: 400
          trigger: "Body fails validation (amount < 1, bad currency/method enum), a method not in getAvailableMethods(currency), defaultPaymentMethod not within paymentMethods, or customer.name missing a space. Source src/api/payments/payments.controller.ts:60,79; src/api/payments/dto/payment.dto.ts:47-124"
        - errorType: UNAUTHORIZED
          status: 401
          trigger: "x-pub-key header absent. Source src/shared/guards/public-key.guard.ts:37"
        - errorType: FORBIDDEN
          status: 403
          trigger: "x-pub-key undecodable / businessId missing / business unresolvable (guard returns false), or ProductsGuard denies the 'checkout' product (prod/live only). Source src/shared/guards/public-key.guard.ts:48-61; src/shared/guards/products.guard.ts:104-132"
        - errorType: CONFLICT
          status: 409
          trigger: "reference (merchantReference) duplicates an existing payment. Source src/api/payments/payments.service.ts:103"
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: "Downstream/service failure; also business.settings.feeBearer read unconditionally before the null guard can TypeError. Source src/api/payments/payments.service.ts:112-126"

    get:
      operationId: checkoutListPayments
      tags: [Checkout]
      summary: List payments
      description: >
        Return the merchant's checkout payments, scoped to the business resolved
        from the `x-business-id` header. Use this to build a payments table or to
        reconcile. This read uses the business-id header scheme, distinct from the
        public-key scheme used by the create endpoint.
      security:
        - BusinessIdAuth: []
      parameters:
        - $ref: "#/components/parameters/BusinessIdHeader"
      responses:
        "200":
          description: A list of payments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
          x-todo: "List query params and pagination envelope not harvested. Source src/api/payments/payments.controller.ts:92-99"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /payments/available-methods:
    get:
      operationId: checkoutGetAvailableMethods
      tags: [Checkout]
      summary: Get available payment methods for a currency
      description: >
        Return the payment methods enabled for a given currency, used by the
        hosted checkout page to render the method picker. This endpoint is public
        (no merchant credential) and responds synchronously. The set is capped by
        the platform's per-currency availability map.
      security: []
      parameters:
        - name: currency
          in: query
          required: true
          description: The currency to list methods for; validated against the Currency enum.
          schema: { $ref: "#/components/schemas/Currency" }
      responses:
        "200":
          description: Available methods for the currency.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /payments/supported-conversion-currencies:
    get:
      operationId: checkoutGetSupportedConversionCurrencies
      tags: [Checkout]
      summary: Get supported conversion currencies
      description: >
        Return the currencies a payment in the given currency can be converted to
        on the hosted checkout page (customer-side FX). This endpoint is public
        and synchronous; the `currency` query is validated against the Currency
        enum.
      security: []
      parameters:
        - name: currency
          in: query
          required: true
          description: The source currency; validated against the Currency enum.
          schema: { $ref: "#/components/schemas/Currency" }
      responses:
        "200":
          description: Supported conversion currencies.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /payments/merchant-reference/{merchantReference}:
    get:
      operationId: checkoutGetPaymentByMerchantReference
      tags: [Checkout]
      summary: Get a payment by merchant reference
      description: >
        Fetch a single payment by the merchant's own reference, scoped to the
        business from the `x-business-id` header. Use this to reconcile a hosted
        payment against your own identifiers. Synchronous read.
      security:
        - BusinessIdAuth: []
      parameters:
        - $ref: "#/components/parameters/BusinessIdHeader"
        - name: merchantReference
          in: path
          required: true
          description: The merchant's own reference supplied when the payment was initiated.
          schema: { type: string }
      responses:
        "200":
          description: The payment.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Payment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /payments/{reference}:
    get:
      operationId: checkoutGetPaymentByReference
      tags: [Checkout]
      summary: Get a payment by reference (hosted-page read)
      description: >
        Fetch a payment by its Fincra reference, embedding the public business
        profile. This backs the hosted checkout page and is public (no merchant
        credential). Synchronous read; also usable to poll a payment's status when
        you did not receive the webhook.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra payment reference returned on initiate.
          schema: { type: string }
      responses:
        "200":
          description: The payment with embedded public business.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Payment" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }

  /payments/{reference}/mark-as-processing:
    patch:
      operationId: checkoutMarkPaymentAsProcessing
      tags: [Checkout]
      summary: Mark a payment as processing
      description: >
        Transition a hosted payment to the Processing state. This is called by the
        checkout UI while a charge is in flight and is public (no merchant
        credential). Synchronous state transition with no request body.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra payment reference.
          schema: { type: string }
      responses:
        "200":
          description: Payment marked as processing.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /payments/{reference}/charges:
    get:
      operationId: checkoutGetPaymentCharges
      tags: [Checkout]
      summary: List charges for a payment
      description: >
        Return all charge attempts made against a hosted payment reference. Used
        by the checkout UI to show attempt history. This endpoint is public (no
        merchant credential) and responds synchronously.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra payment reference.
          schema: { type: string }
      responses:
        "200":
          description: The charges for the payment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /payments/{reference}/charge:
    get:
      operationId: checkoutFindOrCreatePaymentCharge
      tags: [Checkout]
      summary: Find or create a charge for a payment method
      description: >
        Find-or-create the charge for a chosen payment method on a hosted payment,
        and for bank-transfer/EFT it triggers the charge to obtain the pay-in
        details. Called by the checkout UI when the customer selects a method.
        Public (no merchant credential); may be asynchronous for transfer rails
        whose details settle out of band.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra payment reference.
          schema: { type: string }
        - name: type
          in: query
          required: true
          description: The chosen payment method; validated against ChargeType.
          schema: { $ref: "#/components/schemas/ChargeType" }
        - name: bank
          in: query
          required: false
          description: Bank selection for EFT/transfer methods that require it.
          schema: { type: string }
      responses:
        "200":
          description: The charge (with pay-in details for transfer rails).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: checkoutChargePayment
      tags: [Checkout]
      summary: Submit a charge on a hosted payment
      description: >
        Submit the customer's payment details (card, phone, mobile-money operator,
        or bank) to charge a hosted payment. Called by the checkout UI on submit
        and is public (no merchant credential). Card and mobile-money charges are
        asynchronous and continue via the authorize step; the terminal state
        arrives on the `charge.successful` / `charge.failed` webhook.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra payment reference.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargePaymentRequest"
            examples:
              mobileMoneyGhs:
                summary: Ghana mobile-money charge
                value:
                  type: mobile_money
                  phone: "233551234567"
                  operator: MTN
              cardCharge:
                summary: Card charge
                value:
                  type: card
                  card:
                    card_number: "4084127883172787"
                    expiry_month: "09"
                    expiry_year: "27"
                    cvv: "123"
                    card_holder: Amara Okeke
      responses:
        "200":
          description: Charge submitted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /payments/{reference}/charge/authorize:
    post:
      operationId: checkoutAuthorizePaymentCharge
      tags: [Checkout]
      summary: Authorize a hosted payment charge
      description: >
        Complete a hosted-payment charge with an authorization factor (PIN, OTP,
        AVS, etc.), for example the OTP step of a card charge. Called by the
        checkout UI and is public (no merchant credential). Asynchronous: the
        terminal state is delivered by the `charge.successful` / `charge.failed`
        webhook.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra payment reference.
          schema: { type: string }
        - name: type
          in: query
          required: true
          description: The charge type being authorized; validated against ChargeType.
          schema: { $ref: "#/components/schemas/ChargeType" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizeChargeRequest"
            examples:
              otp:
                summary: OTP authorization
                value:
                  otp: "123456"
      responses:
        "200":
          description: Authorization accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /payments/{reference}/convert:
    patch:
      operationId: checkoutConvertPaymentCurrency
      tags: [Checkout]
      summary: Convert a payment's currency
      description: >
        Convert a hosted payment to a different currency on the checkout page
        (customer-side FX). Public (no merchant credential); the `currency` query
        is parsed with an enum pipe and rejected as 400 if invalid. Synchronous,
        but may fail with a 500 if the conversion service errors.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra payment reference.
          schema: { type: string }
        - name: currency
          in: query
          required: true
          description: Target currency; parsed against the Currency enum (400 if invalid).
          schema: { $ref: "#/components/schemas/Currency" }
      responses:
        "200":
          description: Payment converted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Payment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: "Conversion failed. Source src/api/payments/payments.service.ts:438"

  /charges:
    post:
      operationId: checkoutCreateCharge
      tags: [Checkout]
      summary: Create a direct charge
      description: >
        Create a server-to-server charge without the hosted page, selecting the
        rail via `type` (card, bank_transfer, mobile_money, eft, payattitude,
        palmpay, etc.). Authenticated with the `x-business-id` header. Card and
        mobile-money charges are asynchronous and continue via the authorize
        step; the terminal state arrives on the `charge.successful` /
        `charge.failed` webhook.
      security:
        - BusinessIdAuth: []
      parameters:
        - $ref: "#/components/parameters/BusinessIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChargeRequest"
            examples:
              ngnBankTransfer:
                summary: NGN bank-transfer charge
                value:
                  type: bank_transfer
                  amount: 7500
                  currency: NGN
                  reference: charge-req-8c2a1f04
                  accountNumber: "0111111111"
                  customer:
                    email: kwame.mensah@example.com
                    name: Kwame Mensah
              cardCharge:
                summary: NGN card charge
                value:
                  type: card
                  amount: 12000
                  currency: NGN
                  reference: charge-req-9d55e0af
                  callbackUrl: https://merchant.example.com/charge/callback
                  customer:
                    email: amara.okeke@example.com
                    name: Amara Okeke
                  card:
                    card_number: "4084127883172787"
                    expiry_month: "09"
                    expiry_year: "27"
                    cvv: "123"
                    card_holder: Amara Okeke
      responses:
        "201":
          description: Charge created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Charge" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: BAD_REQUEST
          status: 400
          trigger: "DTO validation, unsupported currency/type combination ('Currency not supported for charge type'), amount too low, or restricted-currency access downgraded to 400. Source src/api/charges/dto/charges.dto.ts:400-504; src/api/charges/charges.service.ts:365,2374"
        - errorType: CONFLICT
          status: 409
          trigger: "reference duplicates an existing charge ('Duplicate reference'). Source src/api/charges/charges.service.ts:156"
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: "Unsupported charge/settlement config or downstream channel error. Source src/api/charges/charges.service.ts:2018,2229,2244"

  /charges/initiate:
    post:
      operationId: checkoutInitiateCharge
      tags: [Checkout]
      summary: Initiate a direct charge
      description: >
        Create a charge shell (returning its id and reference) that can be
        authorized later, without submitting full instrument details up front.
        Authenticated with the `x-business-id` header. Asynchronous overall: the
        terminal state is delivered by the `charge.successful` / `charge.failed`
        webhook.
      security:
        - BusinessIdAuth: []
      parameters:
        - $ref: "#/components/parameters/BusinessIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateChargeRequest"
            examples:
              initiate:
                summary: Initiate a card charge shell
                value:
                  type: card
                  reference: charge-req-6b1204de
                  amount: 3000
                  currency: NGN
                  customer:
                    email: amara.okeke@example.com
                    name: Amara Okeke
      responses:
        "201":
          description: Charge initiated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ChargeInitiateResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /charges/merchant-reference/{reference}/authorize:
    post:
      operationId: checkoutAuthorizeChargeByMerchantReference
      tags: [Checkout]
      summary: Authorize a charge by merchant reference
      description: >
        Authorize a charge identified by the merchant's own reference, scoped to
        the business from the `x-business-id` header, supplying the authorization
        factor (PIN/OTP/AVS). Asynchronous: the terminal state arrives on the
        `charge.successful` / `charge.failed` webhook.
      security:
        - BusinessIdAuth: []
      parameters:
        - $ref: "#/components/parameters/BusinessIdHeader"
        - name: reference
          in: path
          required: true
          description: The merchant's own reference for the charge.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizeChargeRequest"
            examples:
              otp:
                summary: OTP authorization
                value:
                  otp: "123456"
      responses:
        "200":
          description: Authorization accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-todo: "Handler reads @Param('id') while the route param is named ':reference', so the reference resolves undefined; likely bug. Source src/api/charges/charges.controller.ts:97-113"

  /charges/{id}/authorize:
    post:
      operationId: checkoutAuthorizeCharge
      tags: [Checkout]
      summary: Authorize a charge by id
      description: >
        Authorize a charge by its numeric Fincra charge id, supplying the
        authorization factor (PIN/OTP/AVS/etc). Authenticated with the
        `x-business-id` header. Asynchronous: the terminal state arrives on the
        `charge.successful` / `charge.failed` webhook.
      security:
        - BusinessIdAuth: []
      parameters:
        - $ref: "#/components/parameters/BusinessIdHeader"
        - name: id
          in: path
          required: true
          description: The numeric Fincra charge id.
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizeChargeRequest"
            examples:
              pin:
                summary: Card PIN authorization
                value:
                  pin: "1234"
      responses:
        "200":
          description: Authorization accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /charges/{id}/capture:
    post:
      operationId: checkoutCaptureCharge
      tags: [Checkout]
      summary: Capture an authorized card charge
      description: >
        Capture a previously authorized card charge (for manual/scheduled capture
        modes), by numeric charge id. Authenticated with the `x-business-id`
        header; no request body. Only card charges can be captured — a non-card
        charge is rejected with 400.
      security:
        - BusinessIdAuth: []
      parameters:
        - $ref: "#/components/parameters/BusinessIdHeader"
        - name: id
          in: path
          required: true
          description: The numeric Fincra charge id.
          schema: { type: integer }
      responses:
        "200":
          description: Charge captured.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-fincra-error-catalog:
