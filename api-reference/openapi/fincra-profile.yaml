        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegenerateApiKeyWithUsernameRequest" }
      responses:
        "200":
          description: API key regenerated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
