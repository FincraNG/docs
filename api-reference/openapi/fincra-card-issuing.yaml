openapi: 3.1.0
info:
  title: Fincra Cards (fincra-card-issuing)
  version: "1.0.0"
  summary: Merchant-facing card-issuing API for the fincra-card-issuing service.
  description: >
    Issue and manage virtual and physical debit cards for your cardholders,
    fund them from your Fincra wallet, set PINs, freeze and terminate them, list
    card transactions, and securely reveal full card details (PAN/CVV) through a
    short-lived ephemeral token.


    Cardholders must be created and (for individuals) KYC-approved, and a card
    product must be activated for your merchant, before a card can be issued.
    Most card mutations are synchronous but call an external program manager: a
    program-manager failure surfaces as HTTP 503 (`failedDependency`). Funding a
    card is ledger-backed and may return `202` while the ledger transaction is
    in flight (`CardTransactionStatus: PENDING`); poll the transaction endpoints
    for the terminal state. This service emits no merchant webhooks in the
    harvested code, so no `webhooks` block is declared.


    This spec is generated from the source of `fincra-card-issuing` on branch
    `develop` (code is truth). The app is Hono + @hono/zod-openapi at `apps/api`
    (routes registered in `apps/api/src/app.ts`). Anything undeterminable from
    code is marked with an `x-todo` extension carrying the exact `file:line`, and
    is listed in EXTRACTION-REPORT-cards.md.
  contact:
    name: Fincra Developer Relations
    url: https://support.fincra.com
x-todo-gateway-prefix: >
  Routes are registered on the Hono app with NO version/base-path prefix
  (apps/api/src/app.ts). The public API prefix a merchant calls (the
  platform-wide /v2 and any /cards mount) is applied at the Kong gateway, which
  is not in this repo. Paths below are exactly as routed in code; prepend the
  confirmed gateway prefix before publishing. See EXTRACTION-REPORT-cards.md.

servers:
  - url: https://sandboxapi.fincra.com
    description: Sandbox (test keys). Powers the docs playground.
  - url: https://api.fincra.com
    description: "Production (live keys). Live mode (ENVIRONMENT=production, init.ts:35) enforces caller-IP whitelisting."

security:
  - ApiKeyAuth: []

tags:
  - name: Cards
    description: Issue, fund, and manage cards, cardholders, and card products.

paths:
  /cardholders:
    post:
      operationId: cardsCreateCardholder
      tags: [Cards]
      summary: Create a cardholder
      description: >
        Create an individual or business cardholder that cards can later be
        issued to. The request is a discriminated union on `type`; individuals
        must be Nigerian (countryCode NG) and supply both a BVN and a NIN, while
        businesses supply a KYB profile whose associated persons and entities'
        shareholding must sum to 100. This call is synchronous and returns the
        created cardholder on 201; program-manager enrollment failure is
        swallowed, so the cardholder is still returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardholderRequest"
            examples:
              individual:
                summary: Individual cardholder (Nigerian, BVN + NIN)
                value:
                  type: individual
                  reference: cardholder-req-3f81a9c2
                  email: amara.okeke@mailinator.com
                  phoneNumber: "+2348031234567"
                  kycProfile:
                    firstName: Amara
                    lastName: Okeke
                    dob: "1994-03-21"
                    countryCode: NG
                    gender: female
                    maritalStatus: single
                    address:
                      line1: 12 Marina Road
                      city: Lagos
                      state: Lagos
                      postalCode: "101001"
                      country: NG
                    identityNumbers:
                      - type: bvn
                        number: "22212345678"
                      - type: nin
                        number: "70123456789"
                    documents:
                      idFrontUrl: https://sandbox-files.fincra.com/id-front-3f81.jpg
                      idType: passport
                      proofOfAddressUrl: https://sandbox-files.fincra.com/poa-3f81.pdf
              business:
                summary: Business cardholder (KYB, shareholding sums to 100)
                value:
                  type: business
                  reference: cardholder-req-7b1204de
                  email: ops@globaltraders.africa
                  phoneNumber: "+2348039876543"
                  address:
                    line1: 55 Awolowo Road
                    city: Lagos
                    state: Lagos
                    postalCode: "101233"
                    country: NG
                  kybProfile:
                    legalName: Global Traders Limited
                    tradeName: Global Traders
                    companyRegistrationNumber: RC-1928374
                    countryOfIncorporation: NG
                    incorporationDate: "2019-06-01"
                    industry: Wholesale trade
                    documents:
                      certificateOfIncorporationUrl: https://sandbox-files.fincra.com/coi-7b12.pdf
                      companyProofOfAddressUrl: https://sandbox-files.fincra.com/poa-7b12.pdf
                      articlesOfAssociationOrMemorandum: https://sandbox-files.fincra.com/aoa-7b12.pdf
                    associatedPersons:
                      - firstName: Chidi
                        lastName: Balogun
                        dob: "1985-11-02"
                        countryCode: NG
                        gender: male
                        maritalStatus: married
                        address:
                          line1: 55 Awolowo Road
                          city: Lagos
                          state: Lagos
                          country: NG
                        identityNumbers:
                          - type: bvn
                            number: "22287654321"
                          - type: nin
                            number: "70198765432"
                        documents:
                          idFrontUrl: https://sandbox-files.fincra.com/dir-id-7b12.jpg
                          idType: national_id
                          proofOfAddressUrl: https://sandbox-files.fincra.com/dir-poa-7b12.pdf
                        shareholderPercentage: 100
                        isDirector: true
      responses:
        "201":
          description: Cardholder created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Cardholder"
              example:
                success: true
                message: successful
                data:
                  id: ch_2a1f04b7c9
                  name: Amara Okeke
                  email: amara.okeke@mailinator.com
                  phoneNumber: "+2348031234567"
                  address:
                    line1: 12 Marina Road
                    city: Lagos
                    state: Lagos
                    postalCode: "101001"
                    country: NG
                  reference: cardholder-req-3f81a9c2
                  type: individual
                  countryCode: NG
                  createdAt: "2026-07-12T09:15:00.000Z"
                  updatedAt: "2026-07-12T09:15:00.000Z"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "Body fails zod validation, including the NG-residency, BVN+NIN, and shareholding-sums-to-100 refinements."
        - errorType: CARDHOLDER_ALREADY_EXISTS
          status: 400
          trigger: "Duplicate reference (business), duplicate identity number, or duplicate business registration number."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not in the merchant's whitelistedIpAddresses.
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: Unhandled or database error.

    get:
      operationId: cardsListCardholders
      tags: [Cards]
      summary: List cardholders
      description: >
        Return a cursor-paginated list of the merchant's cardholders, scoped to
        the authenticated business. Supports filtering by cardholder type and by
        created-at UNIX-second bounds. This call is synchronous; use the opaque
        `cursor` from the response to fetch the next page.
      parameters:
        - name: limit
          in: query
          description: Page size, 1-100. Defaults to 10.
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - name: type
          in: query
          description: Filter by one or more cardholder types.
          schema:
            type: array
            items: { $ref: "#/components/schemas/CardholderType" }
        - name: cursor
          in: query
          description: Opaque pagination cursor from a previous page.
          schema: { type: string, minLength: 1 }
        - name: createdAt.gte
          in: query
          description: Include cardholders created at or after this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.lte
          in: query
          description: Include cardholders created at or before this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.lt
          in: query
          description: Include cardholders created strictly before this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.gt
          in: query
          description: Include cardholders created strictly after this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: A page of cardholders.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardholderPage"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: A query parameter fails validation.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cardholders/{id}:
    get:
      operationId: cardsRetrieveCardholder
      tags: [Cards]
      summary: Retrieve a cardholder
      description: >
        Fetch a single cardholder by its `ch_`-prefixed id, scoped to the
        authenticated business. This call is synchronous. A missing cardholder
        returns HTTP 400 with errorType CARDHOLDER_NOT_FOUND (the service maps
        not-found to 400, not 404).
      parameters:
        - name: id
          in: path
          required: true
          description: The cardholder id (must start with `ch_`).
          schema: { type: string, pattern: "^ch_" }
      responses:
        "200":
          description: The cardholder.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Cardholder"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The id does not start with `ch_`.
        - errorType: CARDHOLDER_NOT_FOUND
          status: 400
          trigger: "No cardholder with this id for the business (notFound maps to 400)."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards:
    post:
      operationId: cardsCreateCard
      tags: [Cards]
      summary: Issue a card
      description: >
        Issue a debit or virtual debit card to an existing cardholder from an
        activated card product. Only `debit_card` and `virtual_debit_card` are
        accepted here (prepaid variants are not). This call is synchronous but
        delegates to an external program manager; a program-manager or cardholder
        enrollment failure surfaces as HTTP 503 (CARD_ISSUANCE_FAILED).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardRequest"
            example:
              reference: card-req-9d55e0af
              cardProductId: cprod_5c2a1f04b7
              cardholderId: ch_2a1f04b7c9
              cardType: virtual_debit_card
              billingAddress:
                line1: 12 Marina Road
                city: Lagos
                state: Lagos
                postalCode: "101001"
                country: NG
              metadata:
                orderId: order-9d55e0af
      responses:
        "201":
          description: Card issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardCreated"
              example:
                success: true
                message: successful
                data:
                  id: card_7b1204de3a
                  status: inactive
                  last4: "4321"
                  panMasked: "539983******4321"
                  expiryMonth: "08"
                  expiryYear: "2029"
                  scheme: mastercard
                  currency: NGN
                  cardProductId: cprod_5c2a1f04b7
                  cardholderId: ch_2a1f04b7c9
                  reference: card-req-9d55e0af
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/DependencyFailure" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body fails zod validation (id prefixes, cardType enum, billing address).
        - errorType: CARD_PRODUCT_NOT_FOUND
          status: 400
          trigger: "No such card product (notFound maps to 400)."
        - errorType: CARD_PRODUCT_ACTIVATION_REQUIRED
          status: 400
          trigger: The merchant has not activated this card product.
        - errorType: CARD_PRODUCT_NOT_ACTIVE
          status: 400
          trigger: "Product/activation not active, or no active program manager."
        - errorType: CARDHOLDER_NOT_FOUND
          status: 400
          trigger: "No such cardholder (notFound maps to 400)."
        - errorType: CARD_PRODUCT_ENTITY_TYPE_MISMATCH
          status: 400
          trigger: The cardholder type does not match the product's entity type.
        - errorType: CARD_ISSUANCE_FAILED
          status: 503
          trigger: The program-manager createCard or cardholder enroll call failed.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

    get:
      operationId: cardsListCards
      tags: [Cards]
      summary: List cards
      description: >
        Return a cursor-paginated list of the merchant's cards, scoped to the
        authenticated business. Supports filtering by card status and by
        created-at UNIX-second bounds. This call is synchronous; use the opaque
        `cursor` to page.
      parameters:
        - name: limit
          in: query
          description: Page size, 1-100. Defaults to 10.
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - name: cursor
          in: query
          description: Opaque pagination cursor from a previous page.
          schema: { type: string, minLength: 1 }
        - name: status
          in: query
          description: Filter by one or more card statuses.
          schema:
            type: array
            items: { $ref: "#/components/schemas/CardStatus" }
        - name: createdAt.gte
          in: query
          description: Include cards created at or after this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.lte
          in: query
          description: Include cards created at or before this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.lt
          in: query
          description: Include cards created strictly before this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.gt
          in: query
          description: Include cards created strictly after this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: A page of cards.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardPage"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: A query parameter fails validation.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}:
    get:
      operationId: cardsRetrieveCard
      tags: [Cards]
      summary: Retrieve a card
      description: >
        Fetch a single card by its `card_`-prefixed id, scoped to the
        authenticated business. This call is synchronous. A missing card returns
        HTTP 400 with errorType CARD_NOT_FOUND (not-found maps to 400).
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
      responses:
        "200":
          description: The card.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Card"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The id does not start with `card_`.
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id for the business (notFound maps to 400)."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

    put:
      operationId: cardsUpdateCard
      tags: [Cards]
      summary: Update a card status (freeze/unfreeze)
      description: >
        Freeze or unfreeze a card by setting `status`. Setting `inactive` freezes
        the card (isFrozen=true) and discards active ephemeral reveal tokens;
        `active` unfreezes it. This call is synchronous and delegates to the
        program manager; a program-manager failure surfaces as HTTP 503
        (CARD_UPDATE_FAILED).
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardRequest"
            example:
              status: inactive
      responses:
        "200":
          description: Card updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardMutationResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/DependencyFailure" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "Body/param fails validation (id prefix, status enum)."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: CARD_ACTIVATION_REQUIRED
          status: 400
          trigger: The card is inactive and not frozen.
        - errorType: CARD_NOT_ACTIVE
          status: 400
          trigger: The card is cancelled.
        - errorType: BAD_REQUEST
          status: 400
          trigger: The card is already in the requested status.
        - errorType: CARD_UPDATE_FAILED
          status: 503
          trigger: The program-manager updateCard call failed.
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: The update affected zero rows.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/activate:
    post:
      operationId: cardsActivateCard
      tags: [Cards]
      summary: Activate a card
      description: >
        Activate a card so it can transact. Takes no request body. This call is
        synchronous and delegates to the program manager; a program-manager
        failure surfaces as HTTP 503 (CARD_ACTIVATION_FAILED). A frozen or
        cancelled card cannot be activated.
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
      responses:
        "200":
          description: Card activated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardActivationResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/DependencyFailure" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The id does not start with `card_`.
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: CARD_ALREADY_ACTIVATED
          status: 400
          trigger: The card status is already active.
        - errorType: CARD_IS_FROZEN
          status: 400
          trigger: The card is frozen.
        - errorType: CARD_NOT_ACTIVE
          status: 400
          trigger: The card is cancelled and cannot be reactivated.
        - errorType: CARD_ACTIVATION_FAILED
          status: 503
          trigger: The program-manager activateCard call failed.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/terminate:
    post:
      operationId: cardsTerminateCard
      tags: [Cards]
      summary: Terminate a card
      description: >
        Terminate (cancel) a card with a reason. Sets status to cancelled,
        enqueues an asynchronous balance-return job, and discards active
        ephemeral reveal tokens. The cancel call to the program manager is
        synchronous; its failure surfaces as HTTP 503 (CARD_CANCELLATION_FAILED).
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TerminateCardRequest"
            example:
              reason: lost
      responses:
        "200":
          description: Card terminated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardTerminationResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/DependencyFailure" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "Body/param fails validation (id prefix, reason enum)."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: CARD_ACTIVATION_REQUIRED
          status: 400
          trigger: The card is inactive and not frozen.
        - errorType: CARD_IS_FROZEN
          status: 400
          trigger: The card is inactive and frozen and cannot be terminated.
        - errorType: CARD_NOT_ACTIVE
          status: 400
          trigger: The card is already cancelled.
        - errorType: CARD_CANCELLATION_FAILED
          status: 503
          trigger: The program-manager cancelCard call failed.
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: The update affected zero rows.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/fund:
    post:
      operationId: cardsFundCard
      tags: [Cards]
      summary: Fund a card
      description: >
        Fund a card by debiting the merchant's main wallet and posting a ledger
        transaction. The settlement amount's currency must equal the card
        currency and its decimal places must not exceed the currency's minor
        units. This call may return 200 when completed, or 202 when the ledger
        transaction is in flight (CardTransactionStatus PENDING); poll the card
        transaction endpoints for the terminal state.
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundCardRequest"
            example:
              settlementAmount:
                amount: 5000
                currency: NGN
              reference: card-fund-3f81a9c2
      responses:
        "200":
          description: Funding completed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardTransaction"
              example:
                success: true
                message: successful
                data:
                  id: cardtx_9d55e0af12
                  type: FUNDING
                  status: SUCCESSFUL
                  presentmentAmount:
                    amount: 5000
                    currency: NGN
                  settlementAmount:
                    amount: 5000
                    currency: NGN
                  feeAmount:
                    amount: 0
                    currency: NGN
                  exchangeRate: "1"
                  reference: card-fund-3f81a9c2
                  createdAt: "2026-07-12T09:20:00.000Z"
                  updatedAt: "2026-07-12T09:20:00.000Z"
        "202":
          description: Funding accepted and in progress (ledger transaction in flight).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardTransaction"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/DependencyFailure" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "Body fails validation, including the amount decimal-places refinement."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: CARD_NOT_ACTIVE
          status: 400
          trigger: The card status is not active.
        - errorType: INVALID_CURRENCY
          status: 400
          trigger: The settlement currency does not match the card currency.
        - errorType: BALANCE_INSUFFICIENT
          status: 400
          trigger: The ledger reports insufficient balance.
        - errorType: TRANSACTION_ALREADY_COMPLETED
          status: 400
          trigger: The ledger reports the transaction already completed.
        - errorType: ACCOUNT_BALANCE_NOT_FOUND
          status: 400
          trigger: "The ledger balance/account for this card:currency is invalid (notFound maps to 400)."
        - errorType: CARD_FUND_COMPENSATION_FAILED
          status: 500
          trigger: The ledger posting failed and the compensating wallet reversal also failed.
        - errorType: INTERNAL_SERVER_ERROR
          status: 503
          trigger: An unmapped ledger error, or a wallet-debit 5xx, surfaced as a dependency failure.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/pin:
    post:
      operationId: cardsSetCardPin
      tags: [Cards]
      summary: Set a card PIN
      description: >
        Set a 4-digit numeric PIN on an active, non-frozen card. This call is
        synchronous and delegates to the program manager; a program-manager
        failure surfaces as HTTP 503 (CARD_PIN_SET_FAILED). The PIN itself is
        never returned.
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCardPinRequest"
            example:
              pin: "4827"
      responses:
        "200":
          description: PIN set.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardIdResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/DependencyFailure" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "The id prefix or the pin format (must be exactly 4 digits) is invalid."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: CARD_IS_FROZEN
          status: 400
          trigger: The card is frozen.
        - errorType: CARD_NOT_ACTIVE
          status: 400
          trigger: The card status is not active.
        - errorType: CARD_PIN_SET_FAILED
          status: 503
          trigger: The program-manager setCardPin call failed.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/balances:
    get:
      operationId: cardsRetrieveCardBalances
      tags: [Cards]
      summary: Retrieve card balances
      description: >
        Return the card's ledger balances as an array of per-currency balance
        objects. An optional `currency` query narrows the account-address lookup
        and defaults to the card's currency. This call is synchronous.
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
        - name: currency
          in: query
          description: Currency to look up; defaults to the card currency.
          schema: { $ref: "#/components/schemas/Currency" }
      responses:
        "200":
          description: The card balances.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        description: One balance object per currency held on the card.
                        items:
                          $ref: "#/components/schemas/CardBalance"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "The id prefix or the currency query is invalid."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: ACCOUNT_BALANCE_NOT_FOUND
          status: 400
          trigger: "The ledger account for this card:currency address was not found (notFound maps to 400)."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/transactions:
    get:
      operationId: cardsListCardTransactions
      tags: [Cards]
      summary: List card transactions
      description: >
        Return a cursor-paginated list of a card's transactions, scoped to the
        authenticated business and card. Supports filtering by transaction type,
        status, and created-at UNIX-second bounds. This call is synchronous; use
        the opaque `cursor` to page.
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
        - name: limit
          in: query
          description: Page size, 1-100. Defaults to 10.
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - name: cursor
          in: query
          description: Opaque pagination cursor from a previous page.
          schema: { type: string, minLength: 1 }
        - name: type
          in: query
          description: Filter by one or more transaction types.
          schema:
            type: array
            items: { $ref: "#/components/schemas/CardTransactionType" }
        - name: status
          in: query
          description: Filter by one or more transaction statuses.
          schema:
            type: array
            items: { $ref: "#/components/schemas/CardTransactionStatus" }
        - name: createdAt.gte
          in: query
          description: Include transactions created at or after this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.lte
          in: query
          description: Include transactions created at or before this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.lt
          in: query
          description: Include transactions created strictly before this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
        - name: createdAt.gt
          in: query
          description: Include transactions created strictly after this UNIX-seconds timestamp.
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: A page of card transactions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardTransactionPage"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "The id prefix or a query parameter is invalid."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/transactions/{transactionId}:
    get:
      operationId: cardsRetrieveCardTransaction
      tags: [Cards]
      summary: Retrieve a card transaction
      description: >
        Fetch a single card transaction by its `cardtx_`-prefixed id, on a card
        identified by its `card_`-prefixed id, scoped to the authenticated
        business. This call is synchronous. A missing card or transaction returns
        HTTP 400 (not-found maps to 400).
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
        - name: transactionId
          in: path
          required: true
          description: The card transaction id (must start with `cardtx_`).
          schema: { type: string, pattern: "^cardtx_" }
      responses:
        "200":
          description: The card transaction.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardTransaction"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "The id or transactionId prefix is invalid."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: CARD_TRANSACTION_NOT_FOUND
          status: 400
          trigger: "No transaction with this id on the card (notFound maps to 400)."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /cards/{id}/ephemeral_tokens:
    post:
      operationId: cardsCreateEphemeralToken
      tags: [Cards]
      summary: Mint an ephemeral reveal token
      description: >
        Mint an opaque, short-lived ephemeral token (etok_...) used to later
        reveal full card details via POST /card_details. The request supplies a
        base64 nonce; the token TTL and the maximum active tokens per card are
        environment-configured, and the oldest token is discarded when the
        maximum is exceeded. This call is synchronous and works only on an active
        card.
      parameters:
        - name: id
          in: path
          required: true
          description: The card id (must start with `card_`).
          schema: { type: string, pattern: "^card_" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEphemeralTokenRequest"
            example:
              nonce: "9pQ4bXhZ2sVc1oKtRmWf7g=="
      responses:
        "200":
          description: Ephemeral token minted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EphemeralTokenResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "The id prefix is invalid, or the nonce is not valid base64."
        - errorType: CARD_NOT_FOUND
          status: 400
          trigger: "No card with this id (notFound maps to 400)."
        - errorType: CARD_NOT_ACTIVE
          status: 400
          trigger: The card status is not active.
        - errorType: EPHEMERAL_NONCE_REUSED
          status: 400
          trigger: The nonce has already been used for this card.
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /card_details:
    post:
      operationId: cardsGetCardDetails
      tags: [Cards]
      summary: Reveal full card details
      description: >
        Reveal the full PAN, CVV, and expiry of a card. This endpoint does NOT
        use the api-key; it authenticates with a short-lived ephemeral Bearer
        token (etok_...) minted by cardsCreateEphemeralToken. The caller proves
        possession via a clientSecret and clientTimestamp whose derived nonce
        must match the token, and the token is consumed atomically on success.
        The response carries no-store cache headers and the token cannot be
        reused.
      security:
        - EphemeralBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetCardDetailsRequest"
            example:
              clientSecret: "b7c9e0af12d34e56f7a8b9c0d1e2f3a4"
              clientTimestamp: 1752312000
      responses:
        "200":
          description: The revealed card details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardDetails"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
        "503": { $ref: "#/components/responses/DependencyFailure" }
      x-fincra-error-catalog:
        - errorType: EPHEMERAL_TOKEN_INVALID
          status: 401
          trigger: "Missing/malformed Bearer token, or the token is not found."
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "Body fails zod validation. (The middleware raises a 400 VALIDATION_FAILED when clientTimestamp is missing/invalid.)"
        - errorType: UNAUTHORIZED
          status: 403
          trigger: The clientTimestamp is outside the +/-60s clock-skew window.
        - errorType: EPHEMERAL_NONCE_INVALID
          status: 403
          trigger: The derived nonce proof does not match the stored nonce.
        - errorType: EPHEMERAL_TOKEN_USED
          status: 400
          trigger: The token was already consumed (including concurrent consumption).
        - errorType: EPHEMERAL_TOKEN_EXPIRED
          status: 400
          trigger: The token is expired or revoked.
        - errorType: CARD_NOT_ACTIVE
          status: 400
          trigger: The card status is not active.
        - errorType: CARD_REVEAL_RETRY_REQUIRED
          status: 503
          trigger: The card is gone or the program-manager getSensitiveCardData call failed.

  /card_products:
    get:
      operationId: cardsListCardProducts
      tags: [Cards]
      summary: List card products
      description: >
        Return the card products available to the merchant (those not inactive),
        each annotated with the merchant-specific activation status, as an array.
        Use this to discover which products can be activated and issued. This
        call is synchronous and takes no parameters.
      responses:
        "200":
          description: The available card products.
