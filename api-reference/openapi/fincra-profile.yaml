      parameters:
        - $ref: "#/components/parameters/NumericIdPath"
      responses:
        "200":
          description: Team user deactivated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/users/initiate-2fa:
    patch:
      operationId: profileInitiate2fa
      tags: [Verification]
      summary: Initiate 2FA setup
      description: >
        Begin two-factor-authentication configuration for the authenticated user. Use to
        start enrolling in 2FA. Synchronous; returns the setup material.
      responses:
        "200":
          description: 2FA setup initiated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/users/enable-2fa:
    patch:
      operationId: profileEnable2fa
      tags: [Verification]
      summary: Enable 2FA
      description: >
        Enable two-factor authentication for the authenticated user after setup. Use to turn
