            schema: { $ref: "#/components/schemas/ExportRequest" }
      responses:
        "200":
          description: Roles export produced.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /user-management/roles/{id}:
    get:
      operationId: profileGetRole
      tags: [Verification]
