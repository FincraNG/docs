        address: { allOf: [ { $ref: "#/components/schemas/Address" } ], description: Residential address. Required. }
        identityNumbers:
          type: array
          default: []
          description: Identity numbers; when countryCode=NG both a BVN and a NIN are required.
          items: { $ref: "#/components/schemas/IdentityNumber" }
        documents: { allOf: [ { $ref: "#/components/schemas/KycDocuments" } ], description: KYC document URLs. Required. }

