        tradeName: { type: string, minLength: 1, description: Trading name. Required. }
        companyRegistrationNumber: { type: string, minLength: 1, description: Company registration number. Required. }
        countryOfIncorporation: { allOf: [ { $ref: "#/components/schemas/CountryCode" } ], description: Country of incorporation. Required. }
        incorporationDate: { type: string, format: date, description: Incorporation date (ISO date); not in the future. Required. }
        documents: { allOf: [ { $ref: "#/components/schemas/KybDocuments" } ], description: KYB document URLs. Required. }
