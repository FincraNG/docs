      description: >
        Return all additional-information items requested for a reserved account,
        identified by its id. Use to discover what provider follow-up data the account
        still needs. Authenticate() only; synchronous.
      parameters:
        - name: id
          in: path
          required: true
          description: The virtual-account id.
          schema: { type: string }
      responses:
        "200":
          description: The requested additional-information items.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /virtual-accounts/accept-terms:
    post:
      operationId: profileAcceptVirtualAccountTerms
      tags: [Payments]
      summary: Accept virtual-account terms
      description: >
        Accept the reserved-account terms agreement using a one-time token and a captcha
        token. This route is mounted with NO auth middleware (see EXTRACTION-REPORT-profile.md);
        it is called from the terms page rather than with a merchant credential.
        Synchronous.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptTermsRequest" }
            example:
              token: 9f8c2a1f04b7d3e5a6c7b8d9
              captchaToken: 03AGdBq26xr...captcha
              ipAddress: 197.210.55.12
      responses:
        "200":
          description: Terms accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: token, captchaToken, or ipAddress missing. Source virtualAccountsValidation.ts:633.

  /customers:
