      responses:
        "200":
          description: API-key regeneration initiated (OTP challenge sent).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /merchants/regenerate-api-key/confirm-otp:
    post:
      operationId: profileConfirmApiKeyRegenerationOtp
      tags: [Verification]
      summary: Confirm API-key regeneration OTP
      description: >
