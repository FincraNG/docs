                    properties:
                      data:
                        $ref: "#/components/schemas/SingleSettlement"
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "id is present but non-numeric."
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Authentication credentials are missing or rejected.
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: The database query fails (DBError special-case).

  /batch/referral/{id}:
    get:
      operationId: settlementsGetReferralBatch
      tags: [Settlements]
      summary: Get a referral batch settlement by id
      description: >
        Fetch a single referral batch settlement by its numeric id. Use this to look up
        one referral batch. The `id` is optional in the schema and does not require a
        business id; when no row matches, the handler returns HTTP 200 with `data: []`
        rather than a 404. Synchronous; no webhook is emitted.
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric referral batch settlement id.
          schema: { type: number }
      responses:
        "200":
          description: The referral batch settlement, or an empty array when not found.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReferralBatchSettlement"
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "id is present but non-numeric."
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Authentication credentials are missing or rejected.
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: The database query fails (DBError special-case).

  /batch/referral/export:
    get:
      operationId: settlementsExportReferralBatches
      tags: [Settlements]
      summary: Export referral batch settlements
      description: >
        Export the merchant's referral batch settlements to a CSV file uploaded to S3,
        returning the file name and URL. It validates against the same schema as the
        referral-batch list route (all fields optional; `perPage` defaults to 10, not
        1000). Synchronous; emits no webhook.
      parameters:
        - name: businessId
          in: query
          description: Optional 24-character business id filter.
          schema: { type: string, minLength: 24, maxLength: 24 }
        - name: page
          in: query
          description: 1-based page number. Defaults to 1.
          schema: { type: integer, default: 1 }
        - name: perPage
          in: query
          description: Items per page. Defaults to 10 on referral export.
          schema: { type: integer, default: 10 }
        - name: transactionCurrency
          in: query
          description: Filter by transaction currency (free-form string).
          schema: { type: string }
        - name: settledCurrency
          in: query
          description: Filter by settled currency (free-form string; not applied as a filter by the query builder).
          schema: { type: string }
        - name: reference
          in: query
          description: Filter by the referral batch reference.
          schema: { type: string }
        - name: settlementDestination
          in: query
          description: Filter by settlement destination.
          schema: { type: string }
        - name: status
          in: query
          description: Filter by status (free-form string).
          schema: { type: string }
        - name: transactionType
          in: query
          description: Filter by transaction type.
          schema: { $ref: "#/components/schemas/ReferralTransactionType" }
        - name: totalCommission
          in: query
          description: Filter by total commission (must be >= 0).
          schema: { type: number, minimum: 0 }
        - name: totalRevenue
          in: query
          description: Filter by total revenue (must be >= 0).
          schema: { type: number, minimum: 0 }
        - name: dateFrom
          in: query
          description: Include referral batches created on or after this date.
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          description: Include referral batches created on or before this date.
          schema: { type: string, format: date }
      responses:
        "200":
          description: Export produced; file name and URL returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ExportResult"
              example:
                success: true
                message: Referral Batches exported successfully
                data:
                  name: referral-batches-2026-07-12.csv
                  url: https://sandbox-files.fincra.com/exports/referral-batches-2026-07-12.csv
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "A query parameter fails validation (negative amount, transactionType not in [payouts, collections], unknown key)."
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Authentication credentials are missing or rejected.
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: The database query fails (DBError special-case).

  /batch/referral:
    get:
      operationId: settlementsListReferralBatches
      tags: [Settlements]
      summary: List referral batch settlements
      description: >
        Return a paginated list of the merchant's referral batch settlements, joined with
        merchant and advocate detail, filterable by reference, transaction type/currency,
        status, total commission, and a date range. All fields are optional and business
        is not required on this route. The route is declared at the router root '/' under
        the `/batch/referral` mount (matches with or without a trailing slash).
        Synchronous; returns `{ results, total }` and emits no webhook.
      parameters:
        - name: businessId
          in: query
          description: Optional 24-character business id filter.
          schema: { type: string, minLength: 24, maxLength: 24 }
        - name: page
          in: query
          description: 1-based page number. Defaults to 1.
          schema: { type: integer, default: 1 }
        - name: perPage
          in: query
          description: Items per page. Defaults to 10.
          schema: { type: integer, default: 10 }
        - name: transactionCurrency
          in: query
          description: Filter by transaction currency (free-form string).
          schema: { type: string }
        - name: settledCurrency
          in: query
          description: Filter by settled currency (free-form string; not applied as a filter by the query builder).
          schema: { type: string }
        - name: reference
          in: query
          description: Filter by the referral batch reference.
          schema: { type: string }
        - name: settlementDestination
          in: query
          description: Filter by settlement destination (accepted but not applied as a filter).
          schema: { type: string }
        - name: status
          in: query
          description: Filter by status (free-form string).
          schema: { type: string }
        - name: transactionType
          in: query
          description: Filter by transaction type.
          schema: { $ref: "#/components/schemas/ReferralTransactionType" }
        - name: totalCommission
          in: query
          description: Filter by total commission (must be >= 0).
          schema: { type: number, minimum: 0 }
        - name: totalRevenue
          in: query
          description: Filter by total revenue (must be >= 0).
          schema: { type: number, minimum: 0 }
        - name: dateFrom
          in: query
          description: Include referral batches created on or after this date.
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          description: Include referral batches created on or before this date.
          schema: { type: string, format: date }
      responses:
        "200":
          description: A page of referral batch settlements.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReferralBatchSettlementPage"
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: "A query parameter fails validation (negative amount, transactionType not in [payouts, collections], unknown key)."
        - errorType: ACCESS_DENIED
          status: 403
          trigger: Authentication credentials are missing or rejected.
        - errorType: INTERNAL_SERVER_ERROR
          status: 500
          trigger: The database query fails (DBError special-case).

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key
      description: >
        Merchant secret or public key, sent in the `api-key` header. The auth middleware
        (fliqpay-utils authMiddleware.authenticate) also accepts a Bearer `authorization`
        header paired with `api-key`/`apikey`, or a `service-secret-key`; this public spec
        is scoped to the `api-key` credential. Missing all credentials yields ACCESS_DENIED
        (HTTP 403).

  parameters:
    BusinessQuery:
      name: business
      in: query
      required: true
      description: The 24-character Fincra business id the settlements belong to.
      schema:
        type: string
        minLength: 24
        maxLength: 24

  responses:
    Forbidden:
      description: The request is not authenticated (missing or rejected credentials).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: You do not have access to this resource
            errorType: ACCESS_DENIED
    Conflict:
      description: >
        Collection ineligible for settlement or not found. NOTE: HttpError passes the
        intended 404/400 as the errors field, so httpCode falls back to CONFLICT/409.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: This collection has already been settled
            errorType: BAD_REQUEST
    UnprocessableEntity:
      description: Validation or request-shape failure. `errorType` identifies the cause.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: business length must be 24 characters long
            errorType: VALIDATION_FAILED
    ServerError:
      description: Unexpected server or database error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: "Error occured during operation. We're currently checking why this is happening."
            errorType: INTERNAL_SERVER_ERROR

  schemas:
    SuccessEnvelope:
      type: object
      description: The standard Fincra success envelope. `data` is [] when a handler returns nothing (e.g. a get by id with no match).
      required: [success]
      properties:
        success:
          type: boolean
          const: true
          description: Always true on a 2xx response.
        message:
          type: string
          description: Human-readable summary of the result.
        data:
          description: The result payload; shape depends on the endpoint.

    ErrorResponse:
      type: object
      description: >
        The shared Fincra error envelope, built by fliqpay-utils APIHelper. Application
        errors return HTTP error.httpCode||400 with `errors` detail; auth failures return
        via the express errorHandler at httpCode||500 without `errors`; the DBError
        special-case returns 500/INTERNAL_SERVER_ERROR without `errors`.
      required: [success, error, errorType]
      properties:
        success:
          type: boolean
          const: false
          description: Always false on an error response.
        error:
          type: string
          description: Human-readable error message.
        errorType:
          $ref: "#/components/schemas/ErrorType"
        errors:
          description: >
            Optional structured detail (e.g. the array of per-field Joi messages on a
            VALIDATION_FAILED). Not present on auth-layer or DBError branches.

    ErrorType:
      type: string
      description: >
        SCREAMING_SNAKE_CASE machine code for the error. Enumerates only the values
        reachable on the in-scope settlement/batch/referral routes (see
        EXTRACTION-REPORT-settlements.md).
      enum:
        - VALIDATION_FAILED
        - UNPROCESSABLE_ENTITY
        - NOT_FOUND
        - BAD_REQUEST
        - ACCESS_DENIED
        - RESOURCE_NOT_FOUND
        - INTERNAL_SERVER_ERROR

    PaymentMethod:
      type: string
      description: >
        Payment method, enum-constrained only on GET /batch/single (the unbatched-single
        list route). All other in-scope routes accept payment method as a free-form string.
      enum: [mobile_money, bank_transfer]

    ReferralTransactionType:
      type: string
      description: Transaction type filter for the referral-batch routes.
      enum: [payouts, collections]

    ExportResult:
      type: object
      description: The CSV export artifact produced by an export endpoint and uploaded to S3.
      required: [name, url]
      properties:
        name: { type: string, description: The generated CSV file name. }
        url: { type: string, description: The location (S3 URL) of the exported CSV file. }

    CollectionSettlement:
      type: object
      description: A row of the collection_settlements table, returned by the settlement read/settle endpoints.
      properties:
        id: { type: integer, description: Numeric settlement id. }
        transaction_reference: { type: string, description: The settlement transaction reference. }
        settlement_destination: { type: string, description: Where the settlement was delivered (e.g. wallet). }
        settlement_time: { type: string, description: The settlement timing (e.g. instant). }
        batch_id: { type: integer, description: "The batch id this settlement belongs to, if batched." }
        businessId: { type: string, description: The 24-character business id owning the settlement. }
        payment_method: { type: string, description: The payment method of the underlying collection. }
        fee: { type: number, description: The settlement fee. }
        currency: { type: string, description: The settlement currency. }
        amount_paid: { type: number, description: The amount paid into settlement. }
        amount_settled: { type: number, description: The amount settled to the business. }
        is_batched: { type: boolean, description: Whether the settlement has been grouped into a batch. }
        status: { type: string, description: The settlement status. }
        is_queued: { type: boolean, description: Whether the settlement is queued for processing. }
        created_at: { type: string, format: date-time, description: Creation timestamp. }
        updated_at: { type: string, format: date-time, description: Last update timestamp. }

    CollectionSettlementPage:
      type: object
      description: An objection paginated page of collection settlements.
      required: [results, total]
      properties:
        results:
          type: array
          description: The collection settlements on this page.
          items: { $ref: "#/components/schemas/CollectionSettlement" }
        total: { type: integer, description: Total number of matching settlements across all pages. }

    BatchSettlement:
      type: object
      description: A row of the batch_settlements table, returned by the batch read endpoints.
      properties:
        id: { type: integer, description: Numeric batch id. }
        transaction_reference: { type: string, description: The batch transaction reference. }
        reference: { type: string, description: The batch reference. }
        settled_currency: { type: string, description: The currency the batch settled in. }
        settlement_destination: { type: string, description: Where the batch was settled. }
        settlement_time: { type: string, description: The batch settlement timing. }
        total_collection_amount: { type: number, description: Sum of collection amounts in the batch. }
        total_collection_fee: { type: number, description: Sum of collection fees in the batch. }
        payment_method: { type: string, description: The payment method of the batch. }
        settlement_fee: { type: number, description: The batch settlement fee. }
        businessId: { type: string, description: The 24-character business id owning the batch. }
        amount_settled: { type: number, description: The amount settled for the batch. }
        approval_status: { type: string, description: The batch approval status. }
        status: { type: string, description: The batch status. }
        payout_status: { type: string, description: The batch payout status. }
        payout_retry_count: { type: integer, description: Number of payout retries for the batch. }
        created_at: { type: string, format: date-time, description: Creation timestamp. }
        updated_at: { type: string, format: date-time, description: Last update timestamp. }

    BatchSettlementPage:
      type: object
      description: An objection paginated page of batch settlements.
      required: [results, total]
      properties:
        results:
          type: array
          description: The batch settlements on this page.
          items: { $ref: "#/components/schemas/BatchSettlement" }
        total: { type: integer, description: Total number of matching batches across all pages. }

    SingleSettlement:
      type: object
      description: A row of the single_settlements table (unbatched settlements), with the columns selected by the read endpoints.
      properties:
        id: { type: integer, description: Numeric single settlement id. }
        transaction_reference: { type: string, description: The transaction reference. }
        settled_currency: { type: string, description: The currency the settlement settled in. }
        businessId: { type: string, description: The 24-character business id owning the settlement. }
        status: { type: string, description: The settlement status. }
        settlement_destination: { type: string, description: Where the settlement was delivered. }
        settlement_time: { type: string, description: The settlement timing. }
        reference: { type: string, description: The settlement reference. }
        amount_settled: { type: number, description: The amount settled. }
        collection_fee: { type: number, description: The collection fee. }
        collection_amount: { type: number, description: The collection amount. }
        payment_method: { type: string, description: The payment method. }
        created_at: { type: string, format: date-time, description: Creation timestamp. }
        updated_at: { type: string, format: date-time, description: Last update timestamp. }

    SingleSettlementPage:
      type: object
      description: An objection paginated page of unbatched single settlements.
      required: [results, total]
      properties:
        results:
          type: array
          description: The single settlements on this page.
          items: { $ref: "#/components/schemas/SingleSettlement" }
        total: { type: integer, description: Total number of matching single settlements across all pages. }

    ReferralBatchSettlement:
      type: object
      description: >
        A referral batch settlement row. The list route returns a join projection of
        merchant, advocate, and referral aggregate columns; the get-by-id route returns
        the referral_batch_settlements row.
      properties:
        merchant_name: { type: string, description: The merchant's name. }
        merchant_email: { type: string, description: The merchant's email. }
        merchant_created_at: { type: string, format: date-time, description: When the merchant was created. }
        merchant_kYC: { type: string, description: The merchant's KYC state. }
        advocate_name: { type: string, description: The referring advocate's name. }
        transaction_type: { type: string, description: The referral transaction type (payouts or collections). }
        settlement_currency: { type: string, description: The referral settlement currency. }
        transaction_currency: { type: string, description: The referral transaction currency. }
        reference: { type: string, description: The referral batch reference. }
        status: { type: string, description: The referral batch status. }
        settlement_destination: { type: string, description: Where the referral batch was settled. }
        created_at: { type: string, format: date-time, description: Creation timestamp. }
        total_commission: { type: number, description: Total referral commission. }
        total_revenue: { type: number, description: Total revenue for the referral batch. }
        total_transaction_amount: { type: number, description: Total transaction amount. }
        settlement_fee: { type: number, description: The referral settlement fee. }
        total_commission_tax: { type: number, description: Total tax on the referral commission. }

    ReferralBatchSettlementPage:
      type: object
      description: An objection paginated page of referral batch settlements.
      required: [results, total]
      properties:
        results:
          type: array
          description: The referral batch settlements on this page.
          items: { $ref: "#/components/schemas/ReferralBatchSettlement" }
        total: { type: integer, description: Total number of matching referral batches across all pages. }

    SettleCollectionRequest:
      type: object
      description: >
        Body for POST / and POST /settle. The only field is `collectionId`; this route does
        NOT take a business id. An empty payload yields UNPROCESSABLE_ENTITY ('No payload
        sent') and a JSON-array body yields UNPROCESSABLE_ENTITY ('Request body must be of
        type object'). Unknown keys are rejected with VALIDATION_FAILED.
      required: [collectionId]
      properties:
        collectionId:
          type: number
          description: The numeric id of the collection to settle.
