components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key
      description: >
        Merchant secret or public key, sent in the `api-key` header (fallback header
        `apikey` is also accepted). The auth-service classifies the key as test or live
        and resolves the merchant; core never inspects the key prefix itself. Source
        node_modules/fliqpay-utils/src/middleware/auth/authUtil.ts:17-39. Note: core
        exposes NO separate x-pub-key/x-business-id flow. Some reference-data routes
        (banks, currencies, countries, currency-pairs, V2 channels) carry no in-app auth
        and rely on the upstream gateway (see the per-route x-todo notes).

  parameters:
    BusinessIdPath:
      name: businessID
      in: path
      required: true
      description: The Fincra business id the transactions belong to; must be owned by the authenticated merchant.
      schema:
        type: string

  responses:
    Forbidden:
      description: The request is not authenticated, or is not allowed for this business/product.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: No API Key Provided
            errorType: ACCESS_DENIED
    NotFound:
      description: The referenced resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: "API Endpoint (/transactions/abc -> GET) not found"
            errorType: RESOURCE_NOT_FOUND
    UnprocessableEntity:
      description: Validation or business-rule failure. `errorType` identifies the cause.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Account could not be resolved. Please check your selection and try again
            errorType: UNPROCESSABLE_ENTITY
    ServerError:
      description: Unexpected server or database error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: "Error occured during operation. We're currently checking why this is happening."
            errorType: INTERNAL_SERVER_ERROR

  schemas:
    SuccessEnvelope:
      type: object
      description: >
        The standard Fincra success envelope built by fincra-utils APIHelper
        (res.json({ success, message, data })). `data` defaults to [] when a handler
        returns nothing. Some raw handlers (channels, currencies, countries) omit
        `message` or spread pagination at the top level. Source
        node_modules/fliqpay-utils/src/utilities/APIHelper.ts:77-81
      required: [success]
      properties:
        success:
          type: boolean
          const: true
          description: Always true on a 2xx response.
        message:
          type: string
          description: Human-readable summary of the result (absent on some raw handlers).
        data:
          description: The result payload; shape depends on the endpoint.

    ErrorResponse:
      type: object
      description: >
        The shared Fincra error envelope. For APIHelper-wrapped controllers it is
        { success:false, error, errorType, errors } (the extra `errors` key carries the
        Joi message array). The global errorHandler emits { success:false, error,
        errorType } with additive code/attribution/retryable only when a 'specific'
        defineError is thrown (none on core paths). Source
        node_modules/fliqpay-utils/src/utilities/APIHelper.ts:128-153
      required: [success, error, errorType]
      properties:
        success:
          type: boolean
          const: false
          description: Always false on an error response.
        error:
          type: string
          description: Human-readable error message.
        errorType:
          $ref: "#/components/schemas/ErrorType"
        errors:
          description: >
            Optional structured detail (e.g. the array of per-field Joi messages on a
            VALIDATION_FAILED). Not present on every error branch.

    ErrorType:
      type: string
      description: >
        Machine code for the error. Enumerates the values reachable on the core merchant
        and reference-data paths (from the error-class map and throw sites; see
        EXTRACTION-REPORT-core.md). The lowercase `validation_failed` and the
        message-as-errorType value on /countries are code-truth quirks of that
        controller's distinct error shape.
      enum:
        - VALIDATION_FAILED
        - UNPROCESSABLE_ENTITY
        - ACCESS_DENIED
        - USER_AUTHENTICATION_FALSE
        - RESOURCE_NOT_FOUND
        - RESOURCE_EXIST
        - OPERATION_FORBIDDEN
        - INTERNAL_SERVER_ERROR
        - SERVER_ERROR
        - SERVICE_UNAVAILABLE
        - HTTP_ERROR
        - HTTP_CONNECTION_ERROR
        - validation_failed

    PaymentDestination:
      type: string
      description: >
        Where a payout is delivered; used to filter the bank list. Source
        src/components/banks/banksInterface.ts:3-8
      enum: [bank_account, mobile_money_wallet, cash_pick_up, settlement_account]

    ResolveAccountRequest:
      type: object
      description: >
        Body for POST /accounts/resolve. Conditional requirements depend on `currency`
        and `type`. Unknown keys are rejected (no .unknown()). Source
        src/components/misc/miscValidation.ts:3-75
      properties:
        currency:
          type: string
          default: NGN
          description: Destination currency; uppercased. Defaults to NGN.
          enum: [NGN, GHS]
        type:
          type: string
          default: nuban
          description: Account/rail type to resolve. Defaults to nuban.
          enum: [nuban, iban, mobile_money, bank_account]
        accountNumber:
          type: string
          description: >
            Account number / MSISDN. Required when type is nuban, mobile_money, or
            bank_account. For NGN it must be exactly 10 digits (^[0-9]+$); for GHS it must
            be numeric (^[0-9]+$) with no length bound.
        bankCode:
          type: string
          minLength: 3
          maxLength: 6
          pattern: "^[0-9]+$"
          description: Local bank/institution code. Required only when currency=NGN and type=nuban.
        mobileMoneyCode:
          type: string
          minLength: 2
          maxLength: 20
          pattern: "^[a-zA-Z]+$"
          description: Mobile-money network code (letters only). Required only when type=mobile_money.
        bankSwiftCode:
          type: string
          pattern: "^[a-zA-Z]{8,11}$"
          description: SWIFT/BIC (8-11 letters). Required only when currency=GHS and type=bank_account.
        iban:
          type: string
          description: IBAN. Required only when type=iban.

    ResolvedAccount:
      type: object
      description: >
        The resolved account result returned by /accounts/resolve. Field set inferred
        from the resolve flow; exact keys not enumerated in the harvest.
      x-todo: "Exact resolved-account response keys not harvested; confirm from miscRepository resolve return shape. Source src/components/misc/miscRepository.ts:101-129"
      properties:
        accountNumber: { type: string, description: The account number that was resolved. }
        accountName: { type: string, description: The resolved account-holder name. }
        bankCode: { type: string, description: The bank/institution code used for the enquiry. }

    ListBusinessTransactionsRequest:
      type: object
      description: >
        Body for the transaction search endpoints (listBusinessTransactionsSchema). The
        exact accepted fields were not enumerated in the harvest; page/perPage pagination
        is the confirmed shape.
      x-todo: "Full field set of listBusinessTransactionsSchema not enumerated (validator name taken from the import + validate() call site). Source src/components/transaction/transactionAPI.ts:13-25"
      properties:
        page:
          type: integer
          default: 1
          minimum: 1
          description: 1-based page number.
        perPage:
          type: integer
          default: 10
          minimum: 1
          description: Items per page.

    VerifyBvnRequest:
      type: object
      description: >
        Body for POST /bvn-verification (newBvnVerificationSchema). Unknown keys rejected.
        Source src/components/bvnVerification/bvnVerificationValidation.ts:4-7
      required: [bvn, business]
      properties:
        bvn:
          type: string
          minLength: 11
          maxLength: 11
          description: The 11-character Bank Verification Number to verify.
        business:
          type: string
          description: The Fincra business id the verification is charged to.

    VerifyDocumentRequest:
      type: object
      description: >
        Body for POST /v2/document-verification (verifyDocumentValidationSchema). The
        inner `data` fields are validated downstream, not at the Joi edge. Source
        src/componentsV2/documentVerification/documentVerificationValidation.ts:4-15
      required: [country, type, data]
      properties:
        country:
          type: string
          description: Country of the document; uppercased.
          enum: [NG, GH, KE]
        type:
          type: string
          description: Document type; uppercased.
          enum: [NATIONAL_ID, BVN, PASSPORT, DRIVERS_LICENSE, VOTERS_CARD]
        data:
          type: object
          description: >
            Free-form object carrying the document-specific fields (e.g. idNumber). Inner
            shape validated downstream, not by the edge Joi schema.
          x-todo: "Per-type inner fields of `data` are enforced downstream, not in Joi. Source src/componentsV2/documentVerification/documentVerificationInterface.ts:27-39"
        refresh:
          type: boolean
          default: false
          description: When true, bypass any cached result and re-run the verification.

    VerifyIdentityRequest:
      type: object
      description: >
        Body for POST /v2/identity-verification (IdentityVerificationSchema). Required
        fields beyond the base three depend on `verificationType` (e.g. nuban needs
        accountNumber + bankCode; bvn/nin/virtualNin need a digit `searchParameter` of
        fixed length). See EXTRACTION-REPORT-core.md for the full per-type matrix. Source
        src/componentsV2/identityVerification/identityVerificationValidation.ts:11-184
      required: [verificationType, searchParameter]
      properties:
        verificationType:
          type: string
          description: >
            The verification to run. Allowed keys per country: NG {passport,
            driversLicense, cac, cacAdvanced, votersCard, tin, virtualNin, nin, bvn,
            bvnAdvanced, address, nuban}; GH {driversLicense, votersCardOld, votersCard};
            KE {passport, nationalId}; ZA {nationalId}; GL {livenessCheck, ocrGeneric}.
        searchParameter:
          type: string
          description: >
            The value to verify; trimmed. Its meaning and constraints depend on
