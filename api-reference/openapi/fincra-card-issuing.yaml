                        items:
                          $ref: "#/components/schemas/CardProduct"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /card_products/{id}:
    get:
      operationId: cardsRetrieveCardProduct
      tags: [Cards]
      summary: Retrieve a card product
      description: >
        Fetch a single card product by its `cprod_`-prefixed id, annotated with
        the merchant's activation status (defaults to inactive if not yet
        activated). This call is synchronous. A missing product returns HTTP 400
        with errorType CARD_PRODUCT_NOT_FOUND (not-found maps to 400).
      parameters:
        - name: id
          in: path
          required: true
          description: The card product id (must start with `cprod_`).
          schema: { type: string, pattern: "^cprod_" }
      responses:
        "200":
          description: The card product.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardProduct"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The id does not start with `cprod_`.
        - errorType: CARD_PRODUCT_NOT_FOUND
          status: 400
          trigger: "No product with this id (notFound maps to 400)."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

  /card_products/{id}/activate:
    post:
      operationId: cardsActivateCardProduct
      tags: [Cards]
      summary: Activate a card product for the merchant
      description: >
        Activate a card product for the calling merchant, creating the
        merchant-card-product activation record (id prefix `mcprod_`). Takes no
        request body. This call is synchronous. Cards can only be issued from an
        activated, active product.
      parameters:
        - name: id
          in: path
          required: true
          description: The card product id (must start with `cprod_`).
          schema: { type: string, pattern: "^cprod_" }
      responses:
        "200":
          description: Card product activated for the merchant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CardProductActivation"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The id does not start with `cprod_`.
        - errorType: CARD_PRODUCT_NOT_FOUND
          status: 400
          trigger: "No product with this id (notFound maps to 400)."
        - errorType: CARD_PRODUCT_NOT_ACTIVE
          status: 400
          trigger: The product status is not active.
        - errorType: CARD_PRODUCT_ALREADY_ACTIVATED
          status: 400
          trigger: The merchant has already activated this product.
        - errorType: CARD_PRODUCT_ACTIVATION_REQUIRED
          status: 400
          trigger: "Defensive: the activation record was not found after insert."
        - errorType: INVALID_API_KEY
          status: 401
          trigger: The api-key header is missing or not resolvable to a merchant.
        - errorType: INVALID_IP_ADDRESS
          status: 401
          trigger: Live mode and the caller IP is not whitelisted.

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key
      description: >
        Merchant api-key sent in the `api-key` header, validated by the auth()
        middleware (apps/api/src/pkg/middleware/auth.ts:36-102) against the
        Profile service GET /merchants/me. The resolved merchant's businessId
        scopes all queries. In live mode (ENVIRONMENT=production) the caller IP
        (True-Client-IP / CF-Connecting-IP) must be in the merchant's
        whitelistedIpAddresses (or the wildcard 0.0.0.0), else 401
        INVALID_IP_ADDRESS.
    EphemeralBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: etok
      description: >
        Short-lived ephemeral reveal token (etok_...) minted by
        cardsCreateEphemeralToken, sent as `Authorization: Bearer etok_<token>`
        and validated by ephemeralBearerAuth (ephemeral_auth.ts:8-67). Used ONLY
        by POST /card_details, which is excluded from api-key auth (app.ts:51).
        The token is single-use and clock-skew bounded (+/-60s of its createdAt).

  responses:
    BadRequest:
      description: >
        Business-rule failure or a resource that was not found. Note: the service
        maps notFound() to HTTP 400 (factory.ts), so all *_NOT_FOUND errorTypes
        surface here. `errorType` identifies the cause.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Card not found
            errorType: CARD_NOT_FOUND
    Unauthorized:
      description: Authentication failed (missing/invalid api-key, non-whitelisted IP, or invalid ephemeral token).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: The API key provided is invalid
            errorType: INVALID_API_KEY
    Forbidden:
      description: The ephemeral reveal proof failed (clock skew or nonce mismatch).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: The reveal nonce proof is invalid
            errorType: EPHEMERAL_NONCE_INVALID
    UnprocessableEntity:
      description: Zod validation of the body, path params, or query failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Validation failed
            errorType: VALIDATION_FAILED
            errors:
              - "cardType: Invalid enum value"
    DependencyFailure:
      description: An external dependency (program manager or ledger) failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: Card issuance failed
            errorType: CARD_ISSUANCE_FAILED
    ServerError:
      description: Unexpected server or database error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            error: An internal server error occurred
            errorType: INTERNAL_SERVER_ERROR

  schemas:
    SuccessEnvelope:
      type: object
      description: The standard Fincra success envelope. Every 2xx JSON wraps its payload under `data`.
      required: [success, message]
      properties:
        success:
          type: boolean
          const: true
          description: Always true on a 2xx response.
        message:
          type: string
          const: successful
          description: Always the literal "successful" on a 2xx response.
        data:
          description: The result payload; shape depends on the endpoint.

    ErrorResponse:
      type: object
      description: >
        The shared Fincra error envelope (handler.ts:10-17, types.ts:62).
        Validation (422) additionally ships an `errors` string array.
      required: [success, error, errorType]
      properties:
        success:
          type: boolean
          const: false
          description: Always false on an error response.
        error:
          type: string
          description: Human-readable error message.
        errorType:
          $ref: "#/components/schemas/ErrorType"
        errors:
          description: >
            Optional structured detail; the array of per-field messages on a
            VALIDATION_FAILED (422). Not present on every error branch.

    ErrorType:
      type: string
      description: >
        SCREAMING_SNAKE_CASE machine code for the error. Enumerates the values
        reachable on the in-scope card paths (in-handler throws plus the
        platform-level validation/auth/not-found/500/503 paths). Note: all
        *_NOT_FOUND types surface with HTTP 400 because notFound() maps to 400.
      enum:
        - VALIDATION_FAILED
        - BAD_REQUEST
        - INVALID_API_KEY
        - INVALID_IP_ADDRESS
        - INTERNAL_SERVER_ERROR
        - ROUTE_NOT_FOUND
        - CARDHOLDER_ALREADY_EXISTS
        - CARDHOLDER_NOT_FOUND
        - CARD_PRODUCT_NOT_FOUND
        - CARD_PRODUCT_ACTIVATION_REQUIRED
        - CARD_PRODUCT_NOT_ACTIVE
        - CARD_PRODUCT_ALREADY_ACTIVATED
        - CARD_PRODUCT_ENTITY_TYPE_MISMATCH
        - CARD_ISSUANCE_FAILED
        - CARD_NOT_FOUND
        - CARD_ACTIVATION_REQUIRED
        - CARD_NOT_ACTIVE
        - CARD_UPDATE_FAILED
        - CARD_ALREADY_ACTIVATED
        - CARD_IS_FROZEN
        - CARD_ACTIVATION_FAILED
        - CARD_CANCELLATION_FAILED
        - CARD_PIN_SET_FAILED
        - INVALID_CURRENCY
        - BALANCE_INSUFFICIENT
        - TRANSACTION_ALREADY_COMPLETED
        - ACCOUNT_BALANCE_NOT_FOUND
        - CARD_FUND_COMPENSATION_FAILED
        - CARD_TRANSACTION_NOT_FOUND
        - EPHEMERAL_NONCE_REUSED
        - EPHEMERAL_TOKEN_INVALID
        - EPHEMERAL_TOKEN_USED
        - EPHEMERAL_TOKEN_EXPIRED
        - EPHEMERAL_NONCE_INVALID
        - UNAUTHORIZED
        - CARD_REVEAL_RETRY_REQUIRED

