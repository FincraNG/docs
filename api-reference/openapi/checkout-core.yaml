components:
  securitySchemes:
    PubKeyAuth:
      type: apiKey
      in: header
      name: x-pub-key
      description: >
        Public-key checkout auth. The `x-pub-key` header carries a base64 value of
        `businessId::...`; the `pk_test_` prefix denotes a test key, `pk_` a live
        key. Used ONLY by POST /payments (initiate hosted checkout). This is NOT
        the secret api-key. Source src/shared/guards/public-key.guard.ts:32-73.
    BusinessIdAuth:
      type: apiKey
      in: header
      name: x-business-id
      description: >
        Business-id header auth used by the direct-charge, payment-link, list, fee,
        and outgoing-webhook endpoints. The `x-business-id` header carries the
        business id directly (no signature/secret verification). Missing header ->
        401; unresolvable business -> 503. Source src/shared/guards/business.guard.ts:14,35-60.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key
      description: >
        Merchant secret api-key (fallback header `apikey`), classified test/live by
        the profile service. In checkout-core it guards only the admin
        outgoing-webhooks route (not documented here as merchant self-serve). The
        merchant checkout surface uses x-pub-key or x-business-id instead. Source
        src/shared/guards/api-key.guard.ts:35-69.

  parameters:
    PubKeyHeader:
      name: x-pub-key
      in: header
      required: true
      description: The merchant's public key (base64 businessId::..., pk_test_/pk_ prefix).
      schema: { type: string }
    BusinessIdHeader:
      name: x-business-id
      in: header
      required: true
      description: The merchant's 24-character Fincra business id.
      schema: { type: string }

  responses:
    BadRequest:
      description: Validation or business-rule failure (NestJS default HttpException body).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 400
            message: ["amount must not be less than 1"]
            error: Bad Request
    Unauthorized:
      description: A required auth header is missing.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 401
            message: x-business-id must be provided in the header
            error: Unauthorized
    Forbidden:
      description: Public key unresolvable, or the business lacks the required product.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 403
            message: Access Denied. You're not authorized to access Checkout product
            error: Forbidden
    NotFound:
      description: The referenced resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 404
            message: Charge not found
            error: Not Found
    Conflict:
      description: A uniqueness constraint was violated (duplicate reference).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 409
            message: Duplicate payment reference
            error: Conflict
    ServiceUnavailable:
      description: The business could not be verified by the profile service.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 503
            message: Unable to verify business
            error: Service Unavailable
    ServerError:
      description: Unexpected or downstream error, often masked with a generic message.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 500
            message: Unable to calculate fee
            error: Internal Server Error

  schemas:
    SuccessEnvelope:
      type: object
      description: >
        The checkout-core success envelope built by Response.send. NOTE: unlike other
        Fincra services, the top-level flag key is `status` (boolean true), not
        `success`. Source src/shared/helpers/response.helper.ts:9-17.
      required: [status]
      properties:
        status:
          type: boolean
          const: true
          description: Always true on a 2xx response.
        message:
          type: string
          description: Human-readable summary of the result (defaults to "success").
        data:
          description: The result payload; shape depends on the endpoint (null when the handler returns nothing).

    ErrorResponse:
      type: object
      description: >
        The error envelope for checkout-core. The global ExceptionLoggerFilter
        re-emits the raw NestJS HttpException body verbatim, so the keys are
        `statusCode`, `message`, `error`. There is NO `success`/`errorType` shape
        in this service (grep for errorType/success:false returns nothing). Source
        src/shared/utils/exception-logger.fliter.ts:9-32.
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          description: The HTTP status code.
        message:
          description: >
            Error message; a string for most errors, or an array of strings for
            class-validator (ValidationPipe) failures.
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        error:
          type: string
