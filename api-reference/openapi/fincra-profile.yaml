openapi: 3.1.0
info:
  title: Fincra Verification and Virtual Accounts (fincra-profile)
  version: "1.0.0"
  summary: Merchant-facing profile, verification, and reserved (virtual) account API for the fincra-profile service.
  description: >
    Manage the merchant profile surface of Fincra: request and manage reserved
    (virtual) accounts across African rails (NGN, GHS, KES, TZS) and cross-border
    IBAN corridors, look up virtual accounts by BVN, manage KYC and business
    settings, customers, beneficiaries, sub-accounts, settlement accounts,
    dashboard users and roles, virtual cards, and API-key/webhook-key rotation.


    Most reads are synchronous. Virtual-account issuing is effectively asynchronous:
    a create call records the request (`status: pending`) and the account is
    provisioned by the downstream provider; poll the list/get endpoints for the
    final state. This service does NOT emit merchant-facing webhooks — the only
    outbound events found in code are internal Slack/notification and 2FA/login
    audit categories, so there is no top-level `webhooks` block.


    This spec is generated from the source of `fincra-profile` on branch
    `restore/ci-build-reusable-workflows` (code is truth). Anything undeterminable
    from code is marked with an `x-todo` extension carrying the exact `file:line`,
    and is listed in EXTRACTION-REPORT-profile.md.
  contact:
    name: Fincra Developer Relations
    url: https://support.fincra.com
x-todo-gateway-prefix: >
  The service mounts every route at "/" with NO version/base-path prefix
  (src/server.ts:95, src/routes/index.ts). The public API prefix a merchant calls
  (observed externally as /profile) is applied at the Kong gateway, which is not in
  this repo (k8s ingress only exposes the internal hosts profile.fincra.com /
  profile-sandbox.dev.fincra.com). Paths below are exactly as routed in code;
  prepend the confirmed gateway prefix before publishing. See
  EXTRACTION-REPORT-profile.md.

servers:
  - url: https://sandboxapi.fincra.com/profile
    description: Sandbox (test keys). Powers the docs playground. Source k8s/overlays/sandbox/app.properties (APP_ENVIRONMENT=test).
  - url: https://api.fincra.com/profile
    description: Production (live keys). Source k8s/overlays/prod/app.properties (APP_ENVIRONMENT=live).

security:
  - ApiKeyAuth: []

tags:
  - name: Payments
    description: Reserved (virtual) account issuing and management, plus KYC required to hold them.
  - name: Verification
    description: BVN lookup for virtual accounts, customer records, and merchant profile/KYC/settings.
  - name: Beneficiaries
    description: Manage saved beneficiaries per business.

paths:
  /virtual-accounts/requests:
    post:
      operationId: profileRequestVirtualAccount
      tags: [Payments]
      summary: Request a reserved (virtual) account
      description: >
        Request a reserved (virtual) account for a merchant. The request body is
        dispatched per currency and accountType (NGN, GHS, KES, TZS local rails, plus
        IBAN/XAF cross-border), each with its own KYC requirements. Use this to
        provision a dedicated account number a payer can fund. Issuing is effectively
        asynchronous: the request is recorded with `status: pending` and provisioned by
        the downstream provider; poll `profileListVirtualAccounts` for the final state.
        This service emits no merchant webhook for the outcome.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVirtualAccountRequest"
            examples:
              ngnCorporate:
                summary: NGN corporate reserved account (BVN-validated)
                value:
                  accountType: corporate
                  currency: NGN
                  channel: wema
                  KYCInformation:
                    businessName: Ada Commerce Limited
                    rcNumber: "1456789"
                    bvn: "22212345678"
                    bvnName: Adaeze Nwosu
              ghsIndividual:
                summary: GHS individual reserved account
                value:
                  accountType: individual
                  currency: GHS
                  phoneNumber: "+233551234567"
                  KYCInformation:
                    firstName: Kwame
                    lastName: Mensah
                    email: kwame.mensah@ada-commerce.com
      responses:
        "200":
          description: Virtual-account request recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/VirtualAccount"
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body fails the per-currency Joi schema. Source src/components/virtualAccounts/validations/index.ts:53.
        - errorType: INVALID_CURRENCY
          status: 422
          trigger: currency is 'MCY', or an unsupported currency reaches validateVirtualAccountCurrency. Source virtualAccountsController.ts:214; virtualAccountsService.ts:738.
        - errorType: ACCESS_DENIED
          status: 403
          trigger: FCY feature disabled for an MCY currency (USD/EUR/GBP/CAD). Source virtualAccountsController.ts:232.
        - errorType: BUSINESS_PROFILE_REQUIRED
          status: 403
          trigger: The merchant has no business profile. Source businessesService.ts:246.
        - errorType: UNPROCESSABLE_ENTITY
          status: 422
          trigger: Invalid country code or prohibited MCY nationality. Source virtualAccountsService.ts:1620, :1575.
        - errorType: DUPLICATE_REFERENCE
          status: 409
          trigger: Duplicate merchantReference on createVirtualAccount. Source virtualAccountsService.ts:158.
    get:
      operationId: profileListVirtualAccountRequests
      tags: [Payments]
      summary: List reserved-account requests
      description: >
        Return a paginated list of the merchant's virtual-account requests (as opposed to
        provisioned accounts), filterable by status, channel, currency, accountType,
        entityType, dates, and references. Use to track requests that have not yet been
        provisioned. Gated by the VIRTUAL_ACCOUNT product.
      parameters:
        - name: page
          in: query
          description: 1-based page number. Defaults to 1.
          schema: { type: integer, default: 1, minimum: 1 }
        - name: perPage
          in: query
          description: Items per page. Defaults to 10.
          schema: { type: integer, default: 10, minimum: 1 }
        - name: status
          in: query
          description: Filter by virtual-account status.
          schema: { $ref: "#/components/schemas/VirtualAccountStatus" }
        - name: channelName
          in: query
          description: Filter by provider channel.
          schema: { $ref: "#/components/schemas/VirtualAccountChannel" }
        - name: currencyType
          in: query
          description: Filter by crypto vs fiat.
          schema: { type: string, enum: [crypto, fiat] }
        - name: currency
          in: query
          description: Filter by currency (uppercased).
          schema: { type: string }
        - name: accountType
          in: query
          description: Filter by account type.
          schema: { $ref: "#/components/schemas/VirtualAccountType" }
        - name: entityType
          in: query
          description: Filter by entity type.
          schema: { $ref: "#/components/schemas/VirtualAccountEntityType" }
        - name: requestedDate
          in: query
          description: Filter by request date (ISO-8601).
          schema: { type: string, format: date }
        - name: issuedDate
          in: query
          description: Filter by issue date (ISO-8601).
          schema: { type: string, format: date }
        - name: businessName
          in: query
          description: Filter by business name.
          schema: { type: string }
        - name: accountNumber
          in: query
          description: Filter by account number.
          schema: { type: string }
        - name: merchantReference
          in: query
          description: Filter by your own reference.
          schema: { type: string }
      responses:
        "200":
          description: A page of virtual-account requests.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts/corporate/self-requests:
    post:
      operationId: profileRequestCorporateVirtualAccount
      tags: [Payments]
      summary: Self-request a corporate reserved account
      description: >
        Self-service variant that provisions a corporate reserved account for the
        authenticated merchant, reusing the core request-virtual-account flow without an
        explicit product-authorization guard at the route. Use when a corporate merchant
        provisions its own account. Issuing is asynchronous; poll the list endpoint for
        the provisioned account number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVirtualAccountRequest"
            example:
              accountType: corporate
              currency: NGN
              channel: wema
              KYCInformation:
                businessName: Ada Commerce Limited
                bvn: "22212345678"
      responses:
        "200":
          description: Corporate virtual-account request recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VirtualAccount" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Wrong accountType/purpose for a corporate self-request. Source virtualAccountsController.ts:156.

  /virtual-accounts/requests/migrate:
    post:
      operationId: profileRequestVirtualAccountForMigration
      tags: [Payments]
      summary: Request a reserved account for migration
      description: >
        Request a reserved account as part of a migration flow (existing merchant moving
        onto Fincra-issued accounts). Same body contract as the core request endpoint and
        gated by the VIRTUAL_ACCOUNT product. Issuing is asynchronous; poll the list
        endpoint for the provisioned account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVirtualAccountRequest"
            example:
              accountType: corporate
              currency: NGN
              channel: wema
              KYCInformation:
                businessName: Ada Commerce Limited
                bvn: "22212345678"
      responses:
        "200":
          description: Migration virtual-account request recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VirtualAccount" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts:
    get:
      operationId: profileListVirtualAccounts
      tags: [Payments]
      summary: List the merchant's reserved accounts
      description: >
        Return a paginated list of the merchant's reserved (virtual) accounts, with
        filters for status, currency, accountType, entityType, dates, and references. Use
        to build a virtual-accounts table or to poll for the provisioned state of a
        request. This route is gated by authenticate() only (no product gate).
      parameters:
        - name: page
          in: query
          description: 1-based page number. Defaults to 1.
          schema: { type: integer, default: 1, minimum: 1 }
        - name: perPage
          in: query
          description: Items per page. Defaults to 10.
          schema: { type: integer, default: 10, minimum: 1 }
        - name: status
          in: query
          description: Filter by virtual-account status.
          schema: { $ref: "#/components/schemas/VirtualAccountStatus" }
        - name: currency
          in: query
          description: Filter by currency (uppercased; not enum-restricted on this query).
          schema: { type: string }
        - name: accountType
          in: query
          description: Filter by account type.
          schema: { $ref: "#/components/schemas/VirtualAccountType" }
        - name: entityType
          in: query
          description: Filter by entity type (main vs sub account).
          schema: { $ref: "#/components/schemas/VirtualAccountEntityType" }
        - name: requestedDate
          in: query
          description: Filter by request date (ISO-8601).
          schema: { type: string, format: date }
        - name: issuedDate
          in: query
          description: Filter by issue date (ISO-8601).
          schema: { type: string, format: date }
        - name: businessName
          in: query
          description: Filter by business name.
          schema: { type: string }
        - name: virtualAccountType
          in: query
          description: Filter by virtual-account type label.
          schema: { type: string }
        - name: accountNumber
          in: query
          description: Filter by account number.
          schema: { type: string }
        - name: merchantReference
          in: query
          description: Filter by your own reference.
          schema: { type: string }
      responses:
        "200":
          description: A page of virtual accounts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: BUSINESS_PROFILE_REQUIRED
          status: 403
          trigger: The merchant has no business profile. Source businessesService.ts:246.
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: A query parameter fails getMerchantVirtualAccountsSchema. Source virtualAccountsValidation.ts:42.

  /virtual-accounts/bvn:
    get:
      operationId: profileGetVirtualAccountsByBvn
      tags: [Verification]
      summary: Look up virtual accounts by BVN
      description: >
        Look up the virtual accounts associated with a Nigerian BVN for a business. Use
        this verification lookup to confirm which reserved accounts map to a given BVN.
        Synchronous. Gated by the VIRTUAL_ACCOUNT product. Returns
        VIRTUAL_ACCOUNT_NOT_FOUND if no account matches the BVN.
      parameters:
        - name: bvn
          in: query
          required: true
          description: The 11-digit Nigerian Bank Verification Number.
          schema: { type: string, minLength: 11, maxLength: 11 }
        - name: business
          in: query
          required: true
          description: The Fincra business id (max 24 chars).
          schema: { type: string, maxLength: 24 }
      responses:
        "200":
          description: Matching virtual accounts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: bvn not exactly 11 chars or business missing/over 24. Source virtualAccountsValidation.ts:62.
        - errorType: VIRTUAL_ACCOUNT_NOT_FOUND
          status: 404
          trigger: No virtual account exists for the BVN. Source virtualAccountsService.ts:139.

  /virtual-accounts/transfer:
    post:
      operationId: profileRequestVirtualAccountForBankTransfer
      tags: [Payments]
      summary: Request a temporary bank-transfer reserved account
      description: >
        Request a short-lived reserved account for a one-off bank transfer of a specific
        amount, expiring after `expiresAt`. Use this for pay-by-bank-transfer collection
        flows where a payer funds a temporary account. Gated by the VIRTUAL_ACCOUNT
        product. Provisioning is asynchronous; the account details are returned for the
        payer to fund.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestBankTransferVirtualAccountRequest"
            example:
              amount: "5000.00"
              expiresAt: 1800
              accountType: corporate
              currency: NGN
              channel: wema
              merchantReference: va-transfer-3f81a9c2
              KYCInformation:
                businessName: Ada Commerce Limited
                email: pay@ada-commerce.com
      responses:
        "200":
          description: Temporary virtual account created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VirtualAccount" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: Body fails requestVirtualAccountForBankTransferSchema. Source virtualAccountsValidation.ts:97.

  /virtual-accounts/generate-for-bank-transfer:
    post:
      operationId: profileGenerateVirtualAccountForBankTransfer
      tags: [Payments]
      summary: Generate a temporary bank-transfer reserved account
      description: >
        Same contract and controller as `profileRequestVirtualAccountForBankTransfer`,
        exposed without the VIRTUAL_ACCOUNT product gate (authenticate() only). Use where
        a temporary bank-transfer account is generated without product authorization.
        Provisioning is asynchronous; the account details are returned for funding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestBankTransferVirtualAccountRequest"
            example:
              amount: "2500.50"
              expiresAt: 900
              accountType: corporate
              currency: NGN
              channel: globus
              accountNumber: "0123456789"
              KYCInformation:
                businessName: Ada Commerce Limited
      responses:
        "200":
          description: Temporary virtual account generated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VirtualAccount" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts/business/{businessID}/sub-accounts/{subAccountID}/requests:
    post:
      operationId: profileRequestSubVirtualAccount
      tags: [Payments]
      summary: Request a reserved account for a sub-account
      description: >
        Request a reserved (virtual) account scoped to a specific sub-account of a
        business. Gated by the VIRTUAL_ACCOUNT product, authenticateWithBusiness, and
        sub-account ownership validation. Provisioning is asynchronous; poll the
        sub-account virtual-accounts endpoint for the result.
      parameters:
        - $ref: "#/components/parameters/BusinessIdPath"
        - $ref: "#/components/parameters/SubAccountIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVirtualAccountRequest"
            example:
              accountType: corporate
              currency: NGN
              channel: wema
              KYCInformation:
                businessName: Ada Commerce Sub Ltd
                bvn: "22212345678"
      responses:
        "200":
          description: Sub-account virtual-account request recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VirtualAccount" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts/business/{businessID}/sub-accounts/{subAccountID}/requests/auto:
    post:
      operationId: profileRequestSubVirtualAccountAuto
      tags: [Payments]
      summary: Auto-request a reserved account for a sub-account
      description: >
        Version-2 auto flow to request a reserved account for a sub-account of a business.
        Same guards as the standard sub-account request (VIRTUAL_ACCOUNT product,
        authenticateWithBusiness, sub-account validation). Provisioning is asynchronous;
        poll the sub-account virtual-accounts endpoint for the result.
      parameters:
        - $ref: "#/components/parameters/BusinessIdPath"
        - $ref: "#/components/parameters/SubAccountIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVirtualAccountRequest"
            example:
              accountType: corporate
              currency: NGN
              channel: wema
              KYCInformation:
                businessName: Ada Commerce Sub Ltd
                bvn: "22212345678"
      responses:
        "200":
          description: Sub-account virtual-account auto-request recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VirtualAccount" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts/business/{businessID}/sub-accounts/{subAccountID}:
    get:
      operationId: profileGetSubAccountVirtualAccounts
      tags: [Payments]
      summary: Get a sub-account's reserved accounts
      description: >
        Return the reserved (virtual) accounts belonging to a specific sub-account of a
        business. Use to poll for the provisioned account of a sub-account request. Gated
        by the VIRTUAL_ACCOUNT product, authenticateWithBusiness, and sub-account
        ownership validation.
      parameters:
        - $ref: "#/components/parameters/BusinessIdPath"
        - $ref: "#/components/parameters/SubAccountIdPath"
      responses:
        "200":
          description: The sub-account's virtual accounts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts/business/{businessID}/sub-accounts:
    get:
      operationId: profileGetBusinessSubAccountsVirtualAccounts
      tags: [Payments]
      summary: Get reserved accounts across a business's sub-accounts
      description: >
        Return the reserved (virtual) accounts across all sub-accounts of a business. Use
        to build a business-wide view of sub-account virtual accounts. Gated by the
        VIRTUAL_ACCOUNT product and authenticateWithBusiness.
      parameters:
        - $ref: "#/components/parameters/BusinessIdPath"
      responses:
        "200":
          description: Virtual accounts across the business's sub-accounts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts/update-info/{id}:
    patch:
      operationId: profileUpdateVirtualAccountInfo
      tags: [Payments]
      summary: Update reserved-account info
      description: >
        Update stored information on a reserved account (Blackthorn provider flow),
        identified by its id. Gated by the VIRTUAL_ACCOUNT product and
        authenticateWithBusiness. Synchronous update of the account metadata.
      parameters:
        - name: id
          in: path
          required: true
          description: The virtual-account id to update.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateVirtualAccountInfoRequest" }
      responses:
        "200":
          description: Virtual-account info updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /virtual-accounts/{id}:
    get:
      operationId: profileGetVirtualAccountById
      tags: [Payments]
      summary: Get one reserved account
      description: >
        Fetch a single reserved (virtual) account by its id, scoped to the merchant's
        business. Use for status polling of a specific account. Gated by the
        VIRTUAL_ACCOUNT product. Returns VIRTUAL_ACCOUNT_NOT_FOUND if the account does not
        belong to the business.
      parameters:
        - name: id
          in: path
          required: true
          description: The virtual-account id.
          schema: { type: string }
      responses:
        "200":
          description: The virtual account.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VirtualAccount" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: BUSINESS_PROFILE_REQUIRED
          status: 403
          trigger: The merchant has no business profile. Source businessesService.ts:246.
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: id fails getOneVirtualAccountSchema. Source virtualAccountsController.ts:665.
        - errorType: VIRTUAL_ACCOUNT_NOT_FOUND
          status: 404
          trigger: No virtual account for this business/id. Source virtualAccountsService.ts:570.

  /virtual-accounts/{id}/update-bvn:
    patch:
      operationId: profileUpdateVirtualAccountBvn
      tags: [Verification]
      summary: Update the BVN on an NGN reserved account
      description: >
        Update the Bank Verification Number attached to an NGN reserved account,
        identified by its id. Use to correct or attach a BVN on an existing account. Gated
        by the VIRTUAL_ACCOUNT product. Synchronous.
      parameters:
        - name: id
          in: path
          required: true
          description: The virtual-account id (max 24 chars).
          schema: { type: string, maxLength: 24 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateVirtualAccountBvnRequest" }
            example:
              id: 63f9a1b2c4d5e6f7a8b9c0d1
              bvn: "22212345678"
      responses:
        "200":
          description: BVN updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: id over 24 chars or bvn not exactly 11 chars. Source virtualAccountsValidation.ts:193.

  /virtual-accounts/additional-information/{additionalInfoId}:
    patch:
      operationId: profileSaveVirtualAccountAdditionalInfo
      tags: [Payments]
      summary: Save additional-information response
      description: >
        Save a merchant's response to a request for additional information on a reserved
        account, identified by the additional-information id. Use to complete provider
        follow-up requirements. Authenticate() only; synchronous.
      parameters:
        - name: additionalInfoId
