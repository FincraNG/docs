openapi: 3.1.0
info:
  title: Fincra Payments (fincra-collections)
  version: "1.0.0"
  summary: Merchant-facing collections (payins), refunds, and chargebacks API for the fincra-collections service.
  description: >
    Read and reconcile inbound payments (collections / payins) that were made to a
    merchant across Fincra's African and cross-border rails, manage the refunds and
    reversals raised against them, respond to compliance additional-information
    requests, and accept or reject chargebacks.


    This service is READ / REFUND / RECONCILE only. It does NOT create charges,
    virtual accounts, mobile-money, or bank-transfer collections: those are created
    upstream (e.g. checkout-core) and by inbound provider webhooks, then recorded and
    read here. The one write that mutates money is the refund, which is asynchronous:
    the create call records the request and the terminal outcome is delivered by the
    Fincra webhook stream and can be polled with the get-by-reference read endpoints.
    `POST /transfer/simulate` is a test-mode helper that simulates an inbound
    pay-with-bank-transfer collection; it does not move real funds.


    This spec is generated from the source of `fincra-collections` on branch
    `restore/bake-build-pipeline` (code is truth). The merchant router `collectionsAPI`
    is mounted at `/` with NO version prefix; `/v2` carries admin webhooks only.
    Auth is delegated to the shared `authMiddleware.authenticate()` (fincra-utils
    authMiddlewareV2), which accepts a merchant api-key header, a bearer token, or a
    service-secret-key. Two routes are notable exceptions and are marked distinctly
    below: `GET /payments/{businessID}/{transactionID}` is NOT api-key authed (guarded
    only by a Mongo Business lookup) and the `/dispute` routes carry NO auth middleware
    at all. Anything undeterminable from code is marked with an `x-todo` extension
    carrying the exact `file:line` and is listed in EXTRACTION-REPORT-collections.md.
  contact:
    name: Fincra Developer Relations
    url: https://support.fincra.com
x-todo-gateway-prefix: >
  The primary merchant router is mounted at "/" with NO version/base-path prefix
  (src/server.ts:65-66; src/routes/index.ts:23-80); the "/v2" router carries admin
  webhooks only. The public API prefix a merchant calls (observed platform-wide as
  /collections and /v2) is applied at the Kong gateway, which is not in this repo.
  Paths below are exactly as routed in code; prepend the confirmed gateway prefix
  before publishing. See EXTRACTION-REPORT-collections.md.

servers:
  - url: https://sandboxapi.fincra.com/collections
    description: Sandbox (test keys). Listed first — powers the docs playground.
  - url: https://api.fincra.com/collections
    description: Production (live keys).

security:
  - ApiKeyAuth: []

tags:
  - name: Payments
    description: List, look up, reconcile, simulate, and dispute inbound collections (payins).
  - name: Refunds
    description: Initiate and track refunds / reversals on collections.
  - name: Chargebacks
    description: List, look up, accept, and reject chargebacks raised on collections.

paths:
  /:
    get:
      operationId: collectionsListCollections
      tags: [Payments]
      summary: List collections
      description: >
        Return a paginated list of the merchant's inbound collections (payins), filtered
        by status, payment method, currency, amount, date range, and reference. Use this
        to build a collections table or to reconcile received payments against your own
        records. This is a synchronous read; no webhook is paired with it. Pagination is
        page-based via `page` and `perPage`.
      parameters:
        - $ref: "#/components/parameters/BusinessQuery"
        - { $ref: "#/components/parameters/PageQuery" }
        - { $ref: "#/components/parameters/PerPageQuery" }
        - name: sourceAmount
          in: query
          description: Filter by the amount received in the source currency.
          schema: { type: number }
        - name: destinationAmount
          in: query
          description: Filter by the amount credited in the destination currency.
          schema: { type: number }
        - name: sourceAmountSettled
          in: query
          description: Filter by the settled amount in the source currency.
          schema: { type: number }
        - name: destinationAmountSettled
          in: query
          description: Filter by the settled amount in the destination currency.
          schema: { type: number }
        - name: sourceCurrency
          in: query
          description: Filter by source currency (trimmed and uppercased; not enum-bound in code).
          schema: { type: string }
        - name: destinationCurrency
          in: query
          description: Filter by destination currency (trimmed and uppercased; not enum-bound in code).
          schema: { type: string }
        - name: dateInitiatedFrom
          in: query
          description: Include collections initiated on or after this date (ISO-8601).
          schema: { type: string, format: date }
        - name: dateInitiatedTo
          in: query
          description: Include collections initiated on or before this date (ISO-8601).
          schema: { type: string, format: date }
        - name: settledDateFrom
          in: query
          description: Include collections settled on or after this date (ISO-8601).
          schema: { type: string, format: date }
        - name: settledDateTo
          in: query
          description: Include collections settled on or before this date (ISO-8601).
          schema: { type: string, format: date }
        - name: status
          in: query
          description: Filter by one or more collection statuses.
          schema:
            type: array
            items: { $ref: "#/components/schemas/CollectionStatus" }
        - name: paymentMethod
          in: query
          description: Filter by one or more payment methods.
          schema:
            type: array
            items: { $ref: "#/components/schemas/PaymentMethod" }
        - name: reference
          in: query
          description: Filter by the Fincra collection reference.
          schema: { type: string }
        - name: searchQuery
          in: query
          description: Free-text search across collection fields.
          schema: { type: string }
        - name: subAccount
          in: query
          description: Filter by a 24-character sub-account id.
          schema: { type: string, minLength: 24, maxLength: 24 }
        - name: includeSubAccounts
          in: query
          description: Include collections belonging to sub-accounts. Defaults to false.
          schema: { type: boolean, default: false }
        - name: virtualAccount
          in: query
          description: Filter by the 24-character virtual (reserved) account id the payment landed on.
          schema: { type: string, minLength: 24, maxLength: 24 }
      responses:
        "200":
          description: A page of collections.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CollectionPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: A query parameter fails Joi validation (e.g. business not 24 chars, bad status/paymentMethod enum, unknown key).
        - errorType: ACCESS_DENIED
          status: 403
          trigger: The api-key/bearer credential fails auth-service verification.

  /get-all-by-date:
    get:
      operationId: collectionsListCollectionsByDate
      tags: [Payments]
      summary: List collections ordered by date
      description: >
        Return a paginated list of the merchant's collections ordered by date. Same
        filter set and validation as `collectionsListCollections` (the two share the
        `getAllCollectionsSchema` validator); the difference is the ordering applied by
        the handler. Use this when you need date-ordered reconciliation output. This is a
        synchronous read; no webhook is paired with it.
      parameters:
        - $ref: "#/components/parameters/BusinessQuery"
        - { $ref: "#/components/parameters/PageQuery" }
        - { $ref: "#/components/parameters/PerPageQuery" }
        - name: sourceCurrency
          in: query
          description: Filter by source currency (trimmed and uppercased; not enum-bound in code).
          schema: { type: string }
        - name: destinationCurrency
          in: query
          description: Filter by destination currency (trimmed and uppercased; not enum-bound in code).
          schema: { type: string }
        - name: dateInitiatedFrom
          in: query
          description: Include collections initiated on or after this date (ISO-8601).
          schema: { type: string, format: date }
        - name: dateInitiatedTo
          in: query
          description: Include collections initiated on or before this date (ISO-8601).
          schema: { type: string, format: date }
        - name: status
          in: query
          description: Filter by one or more collection statuses.
          schema:
            type: array
            items: { $ref: "#/components/schemas/CollectionStatus" }
        - name: paymentMethod
          in: query
          description: Filter by one or more payment methods.
          schema:
            type: array
            items: { $ref: "#/components/schemas/PaymentMethod" }
        - name: reference
          in: query
          description: Filter by the Fincra collection reference.
          schema: { type: string }
        - name: searchQuery
          in: query
          description: Free-text search across collection fields.
          schema: { type: string }
      responses:
        "200":
          description: A page of collections ordered by date.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CollectionPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: A query parameter fails Joi validation.

  /export:
    post:
      operationId: collectionsExportCollections
      tags: [Payments]
      summary: Export collections
      description: >
        Export the merchant's collections (same filter set as the list endpoint, minus
        pagination and the virtualAccount filter) to a file. Use this to produce a
        downloadable reconciliation report. This is a synchronous request; no webhook is
        paired with it. On failure to build the file it can surface a FILE_SYSTEM_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportCollectionsRequest" }
            examples:
              successfulNgnByDateRange:
                summary: Export successful NGN collections for a date range
                value:
                  business: 63f9a1b2c4d5e6f7a8b9c0d1
                  sourceCurrency: NGN
                  status: [successful]
                  paymentMethod: [bank_transfer]
                  dateInitiatedFrom: "2026-06-01"
                  dateInitiatedTo: "2026-06-30"
      responses:
        "200":
          description: Export produced.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The request body fails Joi validation (missing business, bad status/paymentMethod enum, unknown key).
        - errorType: FILE_SYSTEM_ERROR
          status: 500
          trigger: The export file could not be produced/written.

  /refund:
    post:
      operationId: collectionsInitiateRefund
      tags: [Refunds]
      summary: Initiate a refund
      description: >
        Initiate a refund / reversal against a settled collection, identified by its
        transaction reference. Use this to return funds to the payer. The operation is
        asynchronous: this call records the refund request and the terminal outcome is
        delivered via the Fincra webhook stream and can be polled with
        `collectionsGetRefundByReference`. Fails with UNPROCESSABLE_ENTITY if a refund is
        already initiated or the payment details are incomplete.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InitiateRefundRequest" }
            examples:
              refundByReference:
                summary: Refund a collection by its transaction reference
                value:
                  transReference: COL-7f3a1c9e2b
      responses:
        "200":
          description: Refund initiated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The request body fails Joi validation (missing transReference).
        - errorType: UNPROCESSABLE_ENTITY
          status: 422
          trigger: "Business-rule failure: refund already initiated (collectionsService.ts:251) or payment details incomplete (collectionsService.ts:304)."
        - errorType: RESOURCE_NOT_FOUND
          status: 404
          trigger: No collection matches the supplied transReference (collectionsService.ts:261).
    get:
      operationId: collectionsListRefunds
      tags: [Refunds]
      summary: List refunds
      description: >
        Return a paginated list of the merchant's refunds / reversals, filtered by
        currency, amount, status, reference, refund type, and date range. Use this to
        build a refunds table or to reconcile refunds against their originating
        collections. This is a synchronous read; no webhook is paired with it.
      parameters:
        - $ref: "#/components/parameters/BusinessQuery"
        - { $ref: "#/components/parameters/PageQuery" }
        - { $ref: "#/components/parameters/PerPageQuery" }
        - name: currency
          in: query
          description: Filter by currency (trimmed; not enum-bound in code).
          schema: { type: string }
        - name: amount
          in: query
          description: Filter by the original collection amount.
          schema: { type: number }
        - name: amountRefunded
          in: query
          description: Filter by the amount refunded.
          schema: { type: number }
        - name: status
          in: query
          description: Filter by refund status (free-form string; not enum-bound in code).
          schema: { type: string }
        - name: reference
          in: query
          description: Filter by the refund reference.
          schema: { type: string }
        - name: searchQuery
          in: query
          description: Free-text search across refund fields.
          schema: { type: string }
        - name: dateInitiatedFrom
          in: query
          description: Include refunds initiated on or after this date (ISO-8601).
          schema: { type: string, format: date }
        - name: dateInitiatedTo
          in: query
          description: Include refunds initiated on or before this date (ISO-8601).
          schema: { type: string, format: date }
        - name: refundType
          in: query
          description: Filter by refund type (free-form string; not enum-bound in code).
          schema: { type: string }
      responses:
        "200":
          description: A page of refunds.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/RefundPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: A query parameter fails Joi validation (e.g. business not 24 chars).

  /refund/export:
    post:
      operationId: collectionsExportRefunds
      tags: [Refunds]
      summary: Export refunds
      description: >
        Export the merchant's refunds to a file, using the same filter set as the refunds
        list endpoint. Use this to produce a downloadable refunds reconciliation report.
        This is a synchronous request; no webhook is paired with it. On failure to build
        the file it can surface a FILE_SYSTEM_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportRefundsRequest" }
            examples:
              refundsByDateRange:
                summary: Export refunds for a business over a date range
                value:
                  business: 63f9a1b2c4d5e6f7a8b9c0d1
                  currency: NGN
                  dateInitiatedFrom: "2026-06-01"
                  dateInitiatedTo: "2026-06-30"
      responses:
        "200":
          description: Export produced.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/ServerError" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The request body fails Joi validation (missing business).
        - errorType: FILE_SYSTEM_ERROR
          status: 500
          trigger: The export file could not be produced/written.

  /refund/{reference}:
    get:
      operationId: collectionsGetRefundByReference
      tags: [Refunds]
      summary: Get a refund by reference
      description: >
        Fetch a single refund / reversal by its reference. This is the primary way to
        poll for the terminal state of an asynchronous refund initiated with
        `collectionsInitiateRefund`. This is a synchronous read; no webhook is paired
        with it. Returns RESOURCE_NOT_FOUND when the reference matches no refund.
      parameters:
        - name: reference
          in: path
          required: true
          description: The refund reference.
          schema: { type: string }
        - $ref: "#/components/parameters/BusinessQueryOptional"
      responses:
        "200":
          description: The refund.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Refund" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: RESOURCE_NOT_FOUND
          status: 404
          trigger: No refund matches the supplied reference (collectionsService.ts:487).
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: The reference is missing or business is not 24 chars.

  /{id}:
    get:
      operationId: collectionsGetCollectionById
      tags: [Payments]
      summary: Get a collection by id
      description: >
        Fetch a single collection by its numeric Fincra id (the route path is constrained
        to digits only). Use this for status polling when you stored the numeric id; for
        the string reference use `collectionsGetCollectionByReference`. This is a
        synchronous read; no webhook is paired with it.
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric Fincra collection id (path is constrained to digits).
          schema: { type: integer, minimum: 0 }
        - $ref: "#/components/parameters/BusinessQueryOptional"
      responses:
        "200":
          description: The collection.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Collection" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: RESOURCE_NOT_FOUND
          status: 404
          trigger: No collection matches the supplied id (collectionsService.ts:129,149,171,190).
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: business is supplied but not 24 chars.

  /reference/{reference}:
    get:
      operationId: collectionsGetCollectionByReference
      tags: [Payments]
      summary: Get a collection by Fincra reference
      description: >
        Fetch a single collection by its Fincra-issued `reference`. This is the primary
        way to look up a specific inbound payment by the reference Fincra assigned it.
        This is a synchronous read; no webhook is paired with it. Returns
        RESOURCE_NOT_FOUND when the reference matches no collection.
      parameters:
        - name: reference
          in: path
          required: true
          description: The Fincra collection reference.
          schema: { type: string }
        - $ref: "#/components/parameters/BusinessQueryOptional"
      responses:
        "200":
          description: The collection.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Collection" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: RESOURCE_NOT_FOUND
          status: 404
          trigger: No collection matches the supplied reference.
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: reference is missing or business is not 24 chars.

  /merchant-reference/{merchantReference}:
    get:
      operationId: collectionsGetCollectionByMerchantReference
      tags: [Payments]
      summary: Get a collection by merchant reference
      description: >
        Fetch a single collection by the merchant's own supplied reference
        (`merchantReference`). Use this to reconcile an inbound payment against your own
        system's identifiers. This is a synchronous read; no webhook is paired with it.
        Returns RESOURCE_NOT_FOUND when no collection carries the reference.
      parameters:
        - name: merchantReference
          in: path
          required: true
          description: The merchant-supplied reference on the collection.
          schema: { type: string }
        - $ref: "#/components/parameters/BusinessQueryOptional"
      responses:
        "200":
          description: The collection.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Collection" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: RESOURCE_NOT_FOUND
          status: 404
          trigger: No collection matches the supplied merchantReference.
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: merchantReference is missing or business is not 24 chars.

  /channel-reference:
    get:
      operationId: collectionsGetCollectionByChannelReference
      tags: [Payments]
      summary: Get a collection by channel reference
      description: >
        Fetch a single collection by the channel / provider reference, supplied as query
        parameters (`channelName` plus `channelReference`). Use this to reconcile an
        inbound payment against the identifier assigned by the underlying provider. This
        is a synchronous read; no webhook is paired with it.
      parameters:
        - $ref: "#/components/parameters/BusinessQueryOptional"
        - name: channelName
          in: query
          required: true
          description: The provider / channel name that owns the reference.
          schema: { type: string }
        - name: channelReference
          in: query
          required: true
          description: The reference assigned by the provider / channel.
          schema: { type: string }
      responses:
        "200":
          description: The collection.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Collection" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: RESOURCE_NOT_FOUND
          status: 404
          trigger: No collection matches the supplied channelName/channelReference pair.
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: channelName or channelReference is missing.

  /{id}/additional-information:
    get:
      operationId: collectionsListAdditionalInformation
      tags: [Payments]
      summary: List additional-information requests on a collection
      description: >
        List the compliance / AML additional-information requests raised by Fincra on a
        collection, identified by its numeric id. Use this to discover what supporting
        information a merchant must supply before an inbound payment can complete. This
        is a synchronous read; no webhook is paired with it.
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric Fincra collection id.
          schema: { type: integer, minimum: 0 }
        - $ref: "#/components/parameters/BusinessQueryOptional"
      responses:
        "200":
          description: The additional-information requests on the collection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
          x-todo: "Response data item shape for additional-information requests not harvested. Source: src/components/collections/controllers/collectionsController.ts:244-257"
        "400":
          description: >
            Divergent branch. When the collection id matches no record, the service throws
            objection's NotFoundError (not the fincra-utils one), which the shared
            APIHelper ships as HTTP 400 with NO errorType. This is a known bug (see
            EXTRACTION-REPORT-collections.md).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
          x-todo: "objection NotFoundError -> HTTP 400 with errorType undefined (intended 404). Source: src/components/collections/services/collectionAdditionalInformationService.ts:19,103"
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
      x-fincra-error-catalog:
        - errorType: VALIDATION_FAILED
          status: 422
          trigger: id is missing/non-numeric or business is not 24 chars.
    patch:
      operationId: collectionsRespondAdditionalInformation
      tags: [Payments]
      summary: Respond to an additional-information request
      description: >
        Submit the merchant's response to a compliance additional-information request
        raised on a collection, supplying free text, file references, and/or URLs. Use
        this to satisfy the AML follow-up so the inbound payment can proceed. This is a
        synchronous request; no webhook is paired with it. Guarded operations can return
        OPERATION_FORBIDDEN or UNPROCESSABLE_ENTITY when the collection is already
        completed.
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric Fincra collection id.
          schema: { type: integer, minimum: 0 }
      requestBody:
        required: true
        content:
          application/json:
